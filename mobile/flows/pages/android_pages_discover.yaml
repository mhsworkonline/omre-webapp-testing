appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen is in correct starting state | EXPECTED: 'Explore OMRE Modules' visible on home
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger icon | EXPECTED: Drawer slides open showing nav items
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd

# SCENARIO: Pages item is visible in drawer | EXPECTED: 'Pages' label visible in open drawer
- assertVisible: "Pages"

# SCENARIO: Tap Pages navigates to Pages screen | EXPECTED: Pages screen loads without crash
- tapOn: "Pages"
- waitForAnimationToEnd

# SCENARIO: Pages screen header is visible | EXPECTED: 'Pages' heading present on screen
- assertVisible: "Pages"

# SCENARIO: No crash dialog shown on Pages load | EXPECTED: App crash overlay not visible
- assertNotVisible: "Unfortunately"

# SCENARIO: No generic error shown on Pages load | EXPECTED: Error banner not visible
- assertNotVisible: "Something went wrong"

# SCENARIO: No crash after Pages loads | EXPECTED: No error or crash overlay on screen
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# SCENARIO: Discover tab is visible and active | EXPECTED: 'Discover' tab present on Pages screen
- assertVisible: "Discover"

# SCENARIO: Following tab is visible | EXPECTED: 'Following' tab visible on Pages screen
- assertVisible: "Following"

# SCENARIO: Your Pages tab is visible | EXPECTED: 'Your Pages' tab visible on Pages screen
- assertVisible: "Your Pages"

# SCENARIO: Scroll down Pages list | EXPECTED: Swipe up scrolls without crash, more content below
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: No crash after scrolling Pages list | EXPECTED: Crash overlay not visible after scroll
- assertNotVisible: "Unfortunately"

# SCENARIO: No error after scrolling Pages list | EXPECTED: Error banner not visible after scroll
- assertNotVisible: "Something went wrong"

# SCENARIO: Scroll back to top of Pages screen | EXPECTED: Swipe down returns to top, Pages heading visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Pages"

# SCENARIO: Pull to refresh reloads Pages content | EXPECTED: Content refreshes without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: No crash after pull-to-refresh | EXPECTED: Crash overlay not visible after refresh
- assertNotVisible: "Unfortunately"

# SCENARIO: No error after pull-to-refresh | EXPECTED: Error banner not visible after refresh
- assertNotVisible: "Something went wrong"

# SCENARIO: Pages heading still visible after pull-to-refresh | EXPECTED: 'Pages' heading still present
- assertVisible: "Pages"

# SCENARIO: Press Back from Pages returns to home | EXPECTED: Home screen visible after pressing Back
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# SCENARIO: No lingering error on home after leaving Pages | EXPECTED: Crash and error overlays absent on home screen
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# SCENARIO: Re-open drawer after returning to home | EXPECTED: Drawer opens correctly from home screen
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd

# SCENARIO: Pages item still visible in drawer on second visit | EXPECTED: 'Pages' label visible in drawer
- assertVisible: "Pages"

# SCENARIO: Tap Pages re-navigates to Pages screen | EXPECTED: Pages screen loads again without crash
- tapOn: "Pages"
- waitForAnimationToEnd
- assertVisible: "Pages"

# SCENARIO: No crash on second navigation to Pages | EXPECTED: Crash overlay not visible on re-entry
- assertNotVisible: "Unfortunately"

# SCENARIO: No error on second navigation to Pages | EXPECTED: Error banner not visible on re-entry
- assertNotVisible: "Something went wrong"

# SCENARIO: Back from re-navigated Pages returns to home cleanly | EXPECTED: 'Explore OMRE Modules' visible, no error state
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"
