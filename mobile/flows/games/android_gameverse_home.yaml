appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Games module is listed in module switcher | EXPECTED: 'Games' option visible in switcher list
- assertVisible: "Games"

# SCENARIO: Games module entry navigates to Games | EXPECTED: Tapping 'Games' opens Games/GameVerse module
- tapOn: "Games"
- waitForAnimationToEnd

# SCENARIO: Games module loads without crash | EXPECTED: No error overlay appears after entering Games
- assertNotVisible: "Something went wrong"

# SCENARIO: No app crash dialog on Games module load | EXPECTED: App crash overlay not present
- assertNotVisible: "Unfortunately"

# SCENARIO: GameVerse welcome or lobby screen is visible | EXPECTED: 'GameVerse' label visible on screen
- assertVisible: "Games"

# SCENARIO: Games lobby entry point is present | EXPECTED: 'Play Games' CTA visible on welcome screen
- assertVisible: "Play Games"

# SCENARIO: Tournaments entry is visible on welcome screen | EXPECTED: 'Tournaments' option visible
- assertVisible: "Tournaments"

# SCENARIO: Enter GameVerse main lobby | EXPECTED: Tapping 'Play Games' opens the GameVerse lobby without crash
- tapOn: "Play Games"
- waitForAnimationToEnd

# SCENARIO: GameVerse lobby header is present | EXPECTED: 'GameVerse' heading visible in lobby
- assertVisible: "Games"

# SCENARIO: GameVerse lobby loads without crash | EXPECTED: No error overlay in lobby after navigation
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Tournaments shortcut is visible in lobby | EXPECTED: 'Tournaments' tab or button visible in lobby
- assertVisible: "Tournaments"

# SCENARIO: Tap Tournaments navigates to Tournaments screen | EXPECTED: Tournaments screen loads without crash
- tapOn: "Tournaments"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Squad Finder screen loads | EXPECTED: Squad Finder or game lobby content visible
- assertNotVisible: "Something went wrong"

# SCENARIO: Back to GameVerse returns to lobby
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: GameVerse lobby is scrollable downward | EXPECTED: Swipe up scrolls lobby without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: GameVerse lobby scrolls back to top | EXPECTED: Swipe down returns toward top of lobby
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Games"

# SCENARIO: No error state visible after scroll | EXPECTED: 'Something went wrong' not present after scroll
- assertNotVisible: "Something went wrong"

# SCENARIO: Pull to refresh reloads lobby content | EXPECTED: Second swipe down triggers refresh, lobby still visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Games"

# SCENARIO: LFG Squad Finder visible and tappable
- assertVisible: "LFG / Squad Finder"
- tapOn: "LFG / Squad Finder"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Games"

# SCENARIO: Game Library tappable (coordinate - goes deep; Back lands on Social Home)
- tapOn:
    point: "50%,62%"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: No crash after navigation
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# SCENARIO: Games module re-entry via module switcher (already on Social Home after Game Library back)
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Games"
- waitForAnimationToEnd
- assertVisible: "Games"

# SCENARIO: GameVerse stable on second visit | EXPECTED: No crash and GameVerse screen renders correctly
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Back from Games second visit returns to home | EXPECTED: Home screen loads cleanly after second Games visit
- pressKey: Back
- waitForAnimationToEnd
