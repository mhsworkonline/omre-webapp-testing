appId: com.omre.app.posh
---
# Studio Module - android_studio_overview.yaml
# 38 test cases: navigation, overview, drawer items, content tools, back nav
# Note: Studio opens as overlay - swipe UP dismisses to Social Home
# No scroll tests; use taps only

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC02 - Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 - Navigate to Studio
- tapOn: "Studio"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 - Studio screen heading visible
- assertVisible: "Studio"

# TC05 - Tap first content item/card
- tapOn:
    point: "50%,30%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC06 - Multi-Back to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC07 - Re-navigate to Studio
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Studio"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"
      - waitForAnimationToEnd
- assertVisible: "Studio"

