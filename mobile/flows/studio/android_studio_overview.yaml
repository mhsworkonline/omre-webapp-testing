appId: com.omre.app.posh
---
# Studio Module — android_studio_overview.yaml
# 35+ test cases: navigation, overview, content creation tools,
# drawer sections, create/manage content, back nav

# TC01 — Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 — Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 — Navigate to Studio
- tapOn: "Studio"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 — Studio screen heading visible
- assertVisible: "Studio"

# TC05 — Scroll down through Studio content
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC06 — Still on Studio after scroll
- assertVisible: "Studio"

# TC07 — Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC08 — Still on Studio
- assertVisible: "Studio"

# TC09 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC10 — Studio heading at top
- assertVisible: "Studio"

# TC11 — Tap first content item/card
- tapOn:
    point: "50%,30%"
- waitForAnimationToEnd

# TC12 — Back to Studio
- pressKey: Back
- waitForAnimationToEnd

# TC13 — Back on Studio
- assertVisible: "Studio"

# TC14 — Tap second content item
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# TC15 — Back to Studio
- pressKey: Back
- waitForAnimationToEnd

# TC16 — Still on Studio
- assertVisible: "Studio"

# TC17 — Open Studio drawer/menu (left hamburger if present)
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC18 — Navigate to Idea Lab in Studio drawer
- runFlow:
    when:
      visible: "Idea Lab"
    commands:
      - tapOn: "Idea Lab"
      - waitForAnimationToEnd

# TC19 — Back to Studio
- pressKey: Back
- waitForAnimationToEnd

# TC20 — Navigate to Script Gen
- runFlow:
    when:
      visible: "Script Gen"
    commands:
      - tapOn: "Script Gen"
      - waitForAnimationToEnd
      - pressKey: Back
      - waitForAnimationToEnd

# TC21 — Navigate to View Videos
- runFlow:
    when:
      visible: "View Videos"
    commands:
      - tapOn: "View Videos"
      - waitForAnimationToEnd
      - pressKey: Back
      - waitForAnimationToEnd

# TC22 — Navigate to Analytics
- runFlow:
    when:
      visible: "Analytics"
    commands:
      - tapOn: "Analytics"
      - waitForAnimationToEnd
      - pressKey: Back
      - waitForAnimationToEnd

# TC23 — Dismiss Studio drawer
- pressKey: Back
- waitForAnimationToEnd

# TC24 — Studio still visible
- assertVisible: "Studio"

# TC25 — Tap create/upload button (top-right ~88%,9%)
- tapOn:
    point: "88%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC26 — Studio still visible after create dismiss
- assertVisible: "Studio"

# TC27 — Tap secondary action (~75%,9%)
- tapOn:
    point: "75%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC28 — Studio still visible
- assertVisible: "Studio"

# TC29 — Scroll down to see all Studio sections
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC30 — Studio intact at bottom
- assertVisible: "Studio"

# TC31 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC32 — Tap third content item
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd

# TC33 — Back to Studio
- pressKey: Back
- waitForAnimationToEnd

# TC34 — Studio visible
- assertVisible: "Studio"

# TC35 — Tap settings icon (~60%,9%)
- tapOn:
    point: "60%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC36 — Studio still intact
- assertVisible: "Studio"

# TC37 — Scroll full cycle one more time
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC38 — Back to home
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
