appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger | EXPECTED: Drawer slides open on coordinate tap
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd

# SCENARIO: Profile page navigates from drawer | EXPECTED: Tapping 'Profile' opens profile screen
- tapOn: "Profile"
- waitForAnimationToEnd

# SCENARIO: Profile username is displayed | EXPECTED: 'wilacok854' visible on profile header
- assertVisible: "wilacok854"

# SCENARIO: Profile handle is displayed | EXPECTED: '@wilacok' handle visible below username
- assertVisible: "@wilacok"

# SCENARIO: Profile creator badge is displayed | EXPECTED: 'CREATOR' badge visible on profile
- assertVisible: "CREATOR"

# SCENARIO: Edit profile button is present | EXPECTED: 'Edit profile' button visible
- assertVisible: "Edit profile"

# SCENARIO: Share profile button is present | EXPECTED: 'Share' button visible
- assertVisible: "Share"

# SCENARIO: Highlights section header is visible | EXPECTED: 'Highlights' label visible
- assertVisible: "Highlights"

# SCENARIO: Archive button is present | EXPECTED: 'Archive' button visible
- assertVisible: "Archive"

# SCENARIO: Orbit tab switches profile view | EXPECTED: Tab 2 of 10 tapped without crash
- tapOn: "Orbit\nTab 2 of 10"
- waitForAnimationToEnd

# SCENARIO: Reposts tab switches profile view | EXPECTED: Tab 3 of 10 tapped without crash
- tapOn: "Reposts\nTab 3 of 10"
- waitForAnimationToEnd

# SCENARIO: Videos tab switches profile view | EXPECTED: Tab 4 of 10 tapped without crash
- tapOn: "Videos\nTab 4 of 10"
- waitForAnimationToEnd

# SCENARIO: Posts tab returns to default view | EXPECTED: Tab 1 of 10 tapped, returns to Posts
- tapOn: "Posts\nTab 1 of 10"
- waitForAnimationToEnd
