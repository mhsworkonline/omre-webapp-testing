appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger icon | EXPECTED: Drawer opens showing nav items
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- assertVisible: "Home"

# SCENARIO: Images item is visible in drawer | EXPECTED: 'Images' label visible in drawer
- assertVisible: "Images"

# SCENARIO: Tap Images navigates to Images screen | EXPECTED: Images screen loads without crash
- tapOn: "Images"
- waitForAnimationToEnd

# SCENARIO: Images screen header is visible (READ) | EXPECTED: 'Community Images' heading present on screen
- assertVisible: "Community Images"

# SCENARIO: Gallery section heading is visible (READ) | EXPECTED: 'Gallery' label visible below header
- assertVisible: "Gallery"

# SCENARIO: Images grid is scrollable down (READ) | EXPECTED: Swipe up scrolls grid without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll further down Images grid (READ) | EXPECTED: Second swipe reveals more images
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll back to top of Images grid (READ) | EXPECTED: Community Images heading visible after returning to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Community Images"

# SCENARIO: Pull to refresh Images grid (READ) | EXPECTED: Grid reloads, Community Images heading still visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Community Images"

# SCENARIO: Upload new image — tap FAB (CREATE — initiate) | EXPECTED: Upload chooser or camera picker opens
- tapOn:
    point: "88%,88%"
- waitForAnimationToEnd

# SCENARIO: Dismiss upload chooser without selecting (CREATE — cancel) | EXPECTED: Returns to Images screen cleanly
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Community Images"

# SCENARIO: Re-navigate to Images via drawer (READ — second entry) | EXPECTED: Images reloads without crash
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- tapOn: "Images"
- waitForAnimationToEnd
- assertVisible: "Community Images"

# SCENARIO: Gallery section visible on second entry (READ — consistency) | EXPECTED: Gallery heading present
- assertVisible: "Gallery"

# SCENARIO: Scroll Images on second visit (READ) | EXPECTED: Grid still scrollable without crash
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Community Images"

# SCENARIO: Back from Images returns to home | EXPECTED: 'Explore OMRE Modules' visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
