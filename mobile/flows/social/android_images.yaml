appId: com.omre.app.posh
---
# Community Images — android_images.yaml
# 35 test cases: navigation, gallery, scroll,
# share (4 cards), refresh, upload, back nav
# Probe: no image viewer, Back from gallery = Home,
# share icons below each image card row
# FAB at 88%,88% | refresh at 93%,7%

# TC01 — Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 — Open navigation drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC03/04 — Navigate to Community Images
- tapOn: "Images"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC05 — Community Images screen heading
- assertVisible: "Community Images"

# TC06 — Gallery section heading
- assertVisible: "Gallery"

# TC07/08 — Scroll down to reveal all images
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC09 — Community Images heading persists while scrolling
- assertVisible: "Community Images"

# TC10 — Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC11 — Still on Community Images at bottom
- assertVisible: "Community Images"

# TC12/13 — Scroll back to top; Gallery heading visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Gallery"

# TC14 — Tap share on image 1 (row 1, left card — ⊲ at 22%,46%)
- tapOn:
    point: "22%,46%"
- waitForAnimationToEnd

# TC15 — Dismiss share sheet
- pressKey: Back
- waitForAnimationToEnd

# TC16 — Re-navigate to Images (Back from gallery always goes Home)
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Images"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Community Images"

# TC17 — Tap share on image 2 (row 1, right card — ⊲ at 70%,46%)
- tapOn:
    point: "70%,46%"
- waitForAnimationToEnd

# TC18 — Dismiss share sheet
- pressKey: Back
- waitForAnimationToEnd

# TC19 — Re-navigate to Images
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Images"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Community Images"

# TC20 — Tap share on image 3 (row 2, left card — ⊲ at 22%,70%)
- tapOn:
    point: "22%,70%"
- waitForAnimationToEnd

# TC21 — Dismiss share sheet
- pressKey: Back
- waitForAnimationToEnd

# TC22 — Re-navigate to Images
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Images"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Community Images"

# TC23 — Tap share on image 4 (row 2, right card — ⊲ at 70%,70%)
- tapOn:
    point: "70%,70%"
- waitForAnimationToEnd

# TC24 — Dismiss share sheet
- pressKey: Back
- waitForAnimationToEnd

# TC25 — Re-navigate to Images
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Images"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Community Images"

# TC26 — Tap refresh icon (↺ top-right at 93%,7%)
- tapOn:
    point: "93%,7%"
- waitForAnimationToEnd

# TC27/28 — Community Images and Gallery visible after refresh
- assertVisible: "Community Images"
- assertVisible: "Gallery"

# TC29 — Back from Community Images goes to Home (confirmed)
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# TC30 — Tap post input by coordinate (Flutter hint text not in semantics)
- tapOn:
    point: "50%,83%"
- waitForAnimationToEnd

# TC31 — Type caption for image post
- inputText: "Sharing a community image upload test"
- waitForAnimationToEnd

# TC32 — Tap image/camera attach icon (leftmost icon in action row ~10%,87%)
- tapOn:
    point: "10%,87%"
- waitForAnimationToEnd

# TC33 — Grant media permission if prompted
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd

# TC34 — Grant "Allow access to media" variant
- runFlow:
    when:
      visible: "Allow access to media"
    commands:
      - tapOn: "Allow access to media"
      - waitForAnimationToEnd

# TC35 — Select first image from picker (top-left ~17%,25%)
- tapOn:
    point: "17%,25%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC36 — Submit the post with image
- tapOn: "Post"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC37 — Navigate to Community Images to verify new image appears
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Images"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC38 — Community Images accessible after posting with image
- assertVisible: "Community Images"
- assertVisible: "Gallery"

# TC39 — Back to home to find and delete the posted image
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# TC40 — Newest post should be at top of For You feed — tap its options menu
- tapOn:
    point: "92%,35%"
- waitForAnimationToEnd

# TC41 — Tap Delete option (try all common labels)
- runFlow:
    when:
      visible: "Delete post"
    commands:
      - tapOn: "Delete post"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Delete"
    commands:
      - tapOn: "Delete"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Remove"
    commands:
      - tapOn: "Remove"
      - waitForAnimationToEnd
- waitForAnimationToEnd

# TC42 — Confirm deletion (try all confirm labels)
- runFlow:
    when:
      visible: "Yes, delete"
    commands:
      - tapOn: "Yes, delete"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Confirm"
    commands:
      - tapOn: "Confirm"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Yes"
    commands:
      - tapOn: "Yes"
      - waitForAnimationToEnd
- waitForAnimationToEnd

# TC43 — Dismiss menu if delete not found
- pressKey: Back
- waitForAnimationToEnd

# TC44 — Navigate back to Community Images to verify gallery intact
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Images"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC45 — Community Images and Gallery visible after delete cycle
- assertVisible: "Community Images"
- assertVisible: "Gallery"
