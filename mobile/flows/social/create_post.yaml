appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen header visible after launch | EXPECTED: 'Explore OMRE Modules' text visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Feed refresh control visible | EXPECTED: 'Refresh feed' button present
- assertVisible: "Refresh feed"

# SCENARIO: Post submit button visible in composer row | EXPECTED: 'Post' button visible
- assertVisible: "Post"

# SCENARIO: Post category selector visible | EXPECTED: 'Social' dropdown visible in composer row
- assertVisible: "Social"

# SCENARIO: Post composer text field is tappable | EXPECTED: Tap registers on text input at 56%,75%
- tapOn:
    point: "56%,75%"
- waitForAnimationToEnd

# SCENARIO: Text input accepted in post composer | EXPECTED: Typed text 'Automated test post' appears in field
- inputText: "Automated test post"
- assertVisible: "Automated test post"

# SCENARIO: Composer text can be erased and keyboard dismissed | EXPECTED: Text cleared, keyboard closes
- eraseText: 50
- pressKey: Back
- waitForAnimationToEnd
