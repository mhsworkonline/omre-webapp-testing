appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger icon | EXPECTED: Drawer opens showing nav items
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- assertVisible: "Home"

# SCENARIO: Live item is visible in drawer | EXPECTED: 'Live' label visible in drawer
- assertVisible: "Live"

# SCENARIO: Tap Live navigates to Live screen | EXPECTED: Live screen loads without crash
- tapOn: "Live"
- waitForAnimationToEnd

# SCENARIO: Live screen header is visible (READ) | EXPECTED: 'Live' heading present on screen
- assertVisible: "Live"

# SCENARIO: Live stream list is scrollable down (READ) | EXPECTED: Swipe up scrolls list without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll back to top of Live list (READ) | EXPECTED: Swipe down returns to top, Live heading visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Live"

# SCENARIO: Pull to refresh reloads live stream list (READ) | EXPECTED: Content refreshes, Live heading still visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Live"

# SCENARIO: Tap first live stream card to join stream (READ — enter stream) | EXPECTED: Stream viewer or detail screen opens
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd

# SCENARIO: Back from live stream viewer returns to Live list (READ cleanup) | EXPECTED: Live screen visible after Back
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Live"

# SCENARIO: Tap second live stream card (READ — alternate stream) | EXPECTED: Different stream viewer opens without crash
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd

# SCENARIO: Like or react in live stream (UPDATE — reaction) | EXPECTED: Reaction button tap registers without crash
- tapOn:
    point: "90%,80%"
- waitForAnimationToEnd

# SCENARIO: Tap again to toggle reaction (UPDATE — toggle off) | EXPECTED: Second tap removes or changes reaction
- tapOn:
    point: "90%,80%"
- waitForAnimationToEnd

# SCENARIO: Open live chat comment input (CREATE — setup) | EXPECTED: Chat input activates, keyboard appears
- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd

# SCENARIO: Type a live comment (CREATE) | EXPECTED: Text appears in chat input without crash
- inputText: "Amazing stream!"
- waitForAnimationToEnd

# SCENARIO: Send the live comment (CREATE) | EXPECTED: Comment is submitted to live chat
- tapOn:
    point: "93%,92%"
- waitForAnimationToEnd

# SCENARIO: Live chat updates after comment (READ — verify send) | EXPECTED: Chat area still visible, no crash
- waitForAnimationToEnd

# SCENARIO: Dismiss keyboard from live chat (READ cleanup) | EXPECTED: Keyboard dismisses, stream visible
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: Type second comment in live chat (CREATE — second comment) | EXPECTED: Input re-opens and accepts text
- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd
- inputText: "Keep it up!"
- waitForAnimationToEnd

# SCENARIO: Send second live comment (CREATE) | EXPECTED: Second comment submitted without crash
- tapOn:
    point: "93%,92%"
- waitForAnimationToEnd

# SCENARIO: Dismiss keyboard after second comment (READ cleanup) | EXPECTED: Keyboard closes
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: Scroll live chat upward to view earlier messages (READ) | EXPECTED: Chat scrolls showing earlier messages
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: Scroll chat back down to latest messages (READ) | EXPECTED: Returns to most recent messages
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Back from live stream returns to Live list (READ cleanup) | EXPECTED: Live heading visible after exit
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Live"

# SCENARIO: Scroll Live list to discover more streams (READ) | EXPECTED: More live cards visible after scroll
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll back to top of Live list (READ) | EXPECTED: Live heading visible at top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Live"

# SCENARIO: Re-navigate to Live via drawer (READ — second entry) | EXPECTED: Live reloads without crash
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- tapOn: "Live"
- waitForAnimationToEnd
- assertVisible: "Live"

# SCENARIO: Second pull-to-refresh on re-entry (READ) | EXPECTED: Live list refreshes cleanly
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Live"

# SCENARIO: Back from re-navigated Live returns to home | EXPECTED: 'Explore OMRE Modules' visible after Back
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
