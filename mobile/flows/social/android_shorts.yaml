appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger icon | EXPECTED: Drawer opens showing nav items
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- assertVisible: "Home"

# SCENARIO: Shorts item is visible in drawer | EXPECTED: 'Shorts' label visible in drawer
- scrollUntilVisible:
    element:
      text: "Shorts"
    direction: DOWN
    timeout: 5000
- assertNotVisible: "Something went wrong"

# SCENARIO: Tap Shorts navigates to Shorts screen | EXPECTED: Shorts screen loads without crash
- tapOn: "Shorts"
- waitForAnimationToEnd

# SCENARIO: Shorts screen header is visible | EXPECTED: 'Shorts' heading present on screen
- assertNotVisible: "Something went wrong"

# SCENARIO: First short is visible (READ) | EXPECTED: First video loads — screen has content without crash
- waitForAnimationToEnd

# SCENARIO: Swipe up advances to next short (READ) | EXPECTED: Screen transitions to next video
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Shorts context maintained after first swipe | EXPECTED: 'Shorts' heading still present
- assertNotVisible: "Something went wrong"

# SCENARIO: Swipe up again to third short (READ) | EXPECTED: Third video loads without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Like the current short via right-side button (UPDATE — toggle on) | EXPECTED: Like registers without crash
- tapOn:
    point: "93%,42%"
- waitForAnimationToEnd

# SCENARIO: Unlike the short to restore original state (UPDATE — toggle off) | EXPECTED: Unlike registers without crash
- tapOn:
    point: "93%,42%"
- waitForAnimationToEnd

# SCENARIO: Open comments sheet for current short (READ) | EXPECTED: Comment sheet slides up
- tapOn:
    point: "93%,52%"
- waitForAnimationToEnd

# SCENARIO: Comment input field is tappable (CREATE comment setup) | EXPECTED: Keyboard appears after tapping input
- tapOn:
    point: "50%,90%"
- waitForAnimationToEnd

# SCENARIO: Type a comment on the short (CREATE) | EXPECTED: Typed text appears in comment input
- inputText: "Great short!"
- waitForAnimationToEnd

# SCENARIO: Submit the comment (CREATE) | EXPECTED: Comment is posted — send icon tapped by coordinate
- tapOn:
    point: "93%,90%"
- waitForAnimationToEnd

# SCENARIO: Comments list updates after posting (READ) | EXPECTED: Screen still shows comment area without crash
- waitForAnimationToEnd

# SCENARIO: Scroll up through comments to find own comment (READ) | EXPECTED: Comments scroll without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: Close comment sheet with Back (READ cleanup) | EXPECTED: Returns to full-screen short view
- pressKey: Back
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Share current short via right-side share button (READ — share intent) | EXPECTED: Share sheet appears
- tapOn:
    point: "93%,62%"
- waitForAnimationToEnd

# SCENARIO: Dismiss share sheet (READ cleanup) | EXPECTED: Returns to Shorts screen without crash
- pressKey: Back
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Tap video area to pause playback (UPDATE — playback state) | EXPECTED: Video pauses on tap
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# SCENARIO: Tap video area again to resume playback (UPDATE — playback state) | EXPECTED: Video resumes on second tap
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# SCENARIO: Swipe down returns to previous short (READ) | EXPECTED: Previous short visible without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Open comments on previous short (READ) | EXPECTED: Comment sheet opens for this short
- tapOn:
    point: "93%,52%"
- waitForAnimationToEnd

# SCENARIO: Scroll comments list downward (READ) | EXPECTED: Comments scroll smoothly
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll comments back to top (READ) | EXPECTED: Returns to top of comments
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: Close comment sheet (READ cleanup) | EXPECTED: Returns to Shorts fullscreen view
- pressKey: Back
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Re-navigate to Shorts via drawer (READ — second entry) | EXPECTED: Shorts reloads without crash
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- tapOn: "Shorts"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Swipe through three more shorts on second entry (READ) | EXPECTED: All three swipes complete without crash
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Like a short on second visit (UPDATE) | EXPECTED: Like action registers without crash
- tapOn:
    point: "93%,42%"
- waitForAnimationToEnd

# SCENARIO: Back from Shorts returns to home | EXPECTED: 'Explore OMRE Modules' visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
