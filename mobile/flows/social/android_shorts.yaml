appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger icon | EXPECTED: Drawer opens showing nav items
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- assertVisible: "Home"

# SCENARIO: Shorts item is visible in drawer | EXPECTED: 'Shorts' label visible in drawer
- assertVisible: "Shorts"

# SCENARIO: Tap Shorts navigates to Shorts screen | EXPECTED: Shorts screen loads without crash
- tapOn: "Shorts"
- waitForAnimationToEnd

# SCENARIO: Shorts screen header is visible | EXPECTED: 'Shorts' heading present on screen
- assertVisible: "Shorts"

# SCENARIO: Shorts screen shows video content or empty state | EXPECTED: Video thumbnails visible or empty state message shown
- assertNotVisible: "Something went wrong"

# SCENARIO: No crash dialog is shown on Shorts load | EXPECTED: App crash overlay not visible
- assertNotVisible: "Unfortunately"

# SCENARIO: Swipe up advances to next short | EXPECTED: Screen transitions to next video without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Shorts screen still visible after first swipe up | EXPECTED: Shorts context maintained after swipe
- assertNotVisible: "Unfortunately"

# SCENARIO: Swipe up again advances to subsequent short | EXPECTED: Screen transitions again without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Swipe down returns to previous short | EXPECTED: Previous video reappears without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: Shorts screen is still loaded after swipe cycle | EXPECTED: Shorts context intact after swipe down
- assertVisible: "Shorts"

# SCENARIO: Tap on video area toggles pause or play | EXPECTED: Video playback state changes on tap
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# SCENARIO: Tap again to restore play state | EXPECTED: Tap toggles play/pause back without crash
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# SCENARIO: Back navigation exits Shorts to home | EXPECTED: Pressing Back lands on home or previous screen
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: Home screen is visible after exiting Shorts | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Re-navigate to Shorts via drawer | EXPECTED: Drawer tap on 'Shorts' reopens Shorts screen
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- tapOn: "Shorts"
- waitForAnimationToEnd
- assertVisible: "Shorts"

# SCENARIO: Swipe up three times in succession without crash | EXPECTED: All three swipes complete cleanly
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Unfortunately"

# SCENARIO: Back from Shorts second entry returns to home | EXPECTED: Home visible after Back
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Shorts does not display error state after full cycle | EXPECTED: No error or crash overlay shown
- assertNotVisible: "Something went wrong"
