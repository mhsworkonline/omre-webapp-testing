appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Meeting module is listed in module switcher | EXPECTED: 'Meeting' option visible in switcher list
- assertVisible: "Meeting"

# SCENARIO: Meeting module entry navigates to Meeting | EXPECTED: Tapping 'Meeting' opens Meeting module
- tapOn: "Meeting"
- waitForAnimationToEnd

# SCENARIO: Meeting module loads without crash | EXPECTED: No error overlay appears after entering Meeting
- assertNotVisible: "Something went wrong"

# SCENARIO: No app crash dialog on Meeting module load | EXPECTED: App crash overlay not present
- assertNotVisible: "Unfortunately"

# SCENARIO: New Meeting button is visible | EXPECTED: 'New Meeting' CTA present on Meeting screen
- assertVisible: "New Meeting"

# SCENARIO: Join Meeting option is visible | EXPECTED: 'Join' button or option present on Meeting screen
- assertVisible: "Join"

# SCENARIO: Schedule Meeting option is visible | EXPECTED: 'Schedule' button or option present on Meeting screen
- assertVisible: "Schedule"

# SCENARIO: Upcoming Meetings section is visible | EXPECTED: 'Upcoming Meetings' label present on screen
- assertVisible: "Upcoming Meetings"

# SCENARIO: Tap Join Meeting opens join dialog or screen | EXPECTED: Join screen or modal opens without crash
- tapOn: "Join"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Back from Join returns to Meeting screen | EXPECTED: Pressing Back exits join flow and Meeting screen is visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "New Meeting"

# SCENARIO: Tap Schedule opens scheduling screen | EXPECTED: Schedule meeting screen opens without crash
- tapOn: "Schedule"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Back from Schedule returns to Meeting screen | EXPECTED: Pressing Back exits schedule flow and Meeting screen is visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "New Meeting"

# SCENARIO: Meeting screen is scrollable downward | EXPECTED: Swipe up scrolls content without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: No error visible after scrolling | EXPECTED: 'Something went wrong' not present after scroll
- assertNotVisible: "Something went wrong"

# SCENARIO: Meeting screen scrolls back to top | EXPECTED: Swipe down returns to top of Meeting screen
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "New Meeting"

# SCENARIO: Pull to refresh reloads Meeting content | EXPECTED: Second swipe down triggers refresh without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "New Meeting"

# SCENARIO: No crash after refresh on Meeting screen | EXPECTED: No crash overlay after pull to refresh
- assertNotVisible: "Unfortunately"

# SCENARIO: Back from Meeting returns to home screen | EXPECTED: Pressing Back exits Meeting and home screen loads
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Meeting module re-entry via module switcher | EXPECTED: Navigating to Meeting a second time loads without crash
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Meeting"
- waitForAnimationToEnd
- assertVisible: "New Meeting"

# SCENARIO: Meeting stable on second visit | EXPECTED: No crash and all key options visible on second visit
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Upcoming Meetings section persists on second visit | EXPECTED: 'Upcoming Meetings' still visible on re-navigation
- assertVisible: "Upcoming Meetings"

# SCENARIO: Back from Meeting second visit returns to home | EXPECTED: Home screen loads cleanly after second Meeting visit
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
