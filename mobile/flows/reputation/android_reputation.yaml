appId: com.omre.app.posh
---
# Reputation Module — android_reputation.yaml
# 35 test cases: navigation, score display, scroll,
# reputation items, badges, filters, share, back nav

# TC01 — Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 — Open navigation drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC03 — Navigate to Reputation
- tapOn: "Reputation"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 — Reputation screen heading visible
- assertVisible: "Reputation"

# TC05 — Scroll down to see full reputation content
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC06 — Still on Reputation after scroll
- assertVisible: "Reputation"

# TC07 — Second scroll down
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC08 — Still on Reputation at bottom
- assertVisible: "Reputation"

# TC09 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC10 — Reputation heading visible at top
- assertVisible: "Reputation"

# TC11 — Scroll back to top second swipe
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC12 — Verify reputation content loaded at top
- assertVisible: "Reputation"

# TC13 — Tap first interactive item in reputation list
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd

# TC14 — Back to Reputation from detail
- pressKey: Back
- waitForAnimationToEnd

# TC15 — Back on Reputation screen
- assertVisible: "Reputation"

# TC16 — Tap second item in list
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# TC17 — Back to Reputation
- pressKey: Back
- waitForAnimationToEnd

# TC18 — Still on Reputation
- assertVisible: "Reputation"

# TC19 — Scroll down to middle of list
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC20 — Tap item visible in middle of list
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd

# TC21 — Back to Reputation
- pressKey: Back
- waitForAnimationToEnd

# TC22 — Reputation still accessible
- assertVisible: "Reputation"

# TC23 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC24 — Tap top-right action icon filter/share/settings
- tapOn:
    point: "88%,9%"
- waitForAnimationToEnd

# TC25 — Dismiss any dialog/sheet opened
- pressKey: Back
- waitForAnimationToEnd

# TC26 — Back on Reputation after dismissing action
- assertVisible: "Reputation"

# TC27 — Tap secondary action icon if present
- tapOn:
    point: "75%,9%"
- waitForAnimationToEnd

# TC28 — Dismiss
- pressKey: Back
- waitForAnimationToEnd

# TC29 — Still on Reputation
- assertVisible: "Reputation"

# TC30 — Scroll to bottom to check load-more behavior
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC31 — Reputation screen still intact at bottom
- assertVisible: "Reputation"

# TC32 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC33 — Reputation heading visible after full scroll cycle
- assertVisible: "Reputation"

# TC34 — Re-open drawer from Reputation screen then close
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC35 — Back from Reputation exits to home
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
