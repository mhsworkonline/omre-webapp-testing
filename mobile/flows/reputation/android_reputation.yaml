appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger icon | EXPECTED: Drawer opens showing nav items
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- assertVisible: "Home"

# SCENARIO: Reputation item is visible in drawer | EXPECTED: 'Reputation' label visible in drawer
- assertVisible: "Reputation"

# SCENARIO: Tap Reputation navigates to Reputation screen | EXPECTED: Reputation screen loads without crash
- tapOn: "Reputation"
- waitForAnimationToEnd

# SCENARIO: Reputation screen header is visible (READ) | EXPECTED: 'Reputation' heading present on screen
- assertVisible: "Reputation"

# SCENARIO: Logged-in username is shown on Reputation screen (READ) | EXPECTED: 'wilacok854' visible in profile section
- assertVisible: "wilacok854"

# SCENARIO: Current rank label is shown (READ) | EXPECTED: 'Recruit' rank label visible
- assertVisible: "Recruit"

# SCENARIO: Reputation score value is shown (READ) | EXPECTED: Numeric score visible (0 for new account)
- assertVisible: "0"

# SCENARIO: Points-to-next-rank indicator is visible (READ) | EXPECTED: '50' points threshold visible
- assertVisible: "50"

# SCENARIO: Reputation screen is scrollable down (READ) | EXPECTED: Swipe up reveals more content below
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Score category breakdown is visible after scroll (READ) | EXPECTED: Breakdown section present below fold
- waitForAnimationToEnd

# SCENARIO: Scroll back to top of Reputation screen (READ) | EXPECTED: Reputation heading and username visible at top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Reputation"

# SCENARIO: View Leaderboard link is present (READ) | EXPECTED: 'View Leaderboard' action visible on screen
- assertVisible: "View Leaderboard"

# SCENARIO: Tap View Leaderboard opens leaderboard (READ — leaderboard view) | EXPECTED: Leaderboard screen opens
- tapOn: "View Leaderboard"
- waitForAnimationToEnd

# SCENARIO: Leaderboard screen header is visible (READ) | EXPECTED: 'Leaderboard' heading visible
- assertVisible: "Leaderboard"

# SCENARIO: Leaderboard list is scrollable (READ) | EXPECTED: Swipe up scrolls list without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll down further through leaderboard (READ) | EXPECTED: More entries visible
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll back to top of leaderboard (READ) | EXPECTED: Leaderboard heading visible at top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Leaderboard"

# SCENARIO: Pull to refresh leaderboard (READ) | EXPECTED: Leaderboard data refreshes without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Leaderboard"

# SCENARIO: Back from leaderboard returns to Reputation screen (READ cleanup) | EXPECTED: Reputation heading visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Reputation"

# SCENARIO: Username persists after leaderboard visit (READ — state check) | EXPECTED: 'wilacok854' still visible
- assertVisible: "wilacok854"

# SCENARIO: Rank persists after leaderboard visit (READ — state check) | EXPECTED: 'Recruit' still visible
- assertVisible: "Recruit"

# SCENARIO: Scroll down Reputation to reach How it Works section (READ) | EXPECTED: Section loads without crash
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll back to top after reading sections (READ) | EXPECTED: Reputation heading visible at top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Reputation"

# SCENARIO: Pull to refresh Reputation screen (READ) | EXPECTED: Score refreshes, Reputation heading visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Reputation"

# SCENARIO: Re-navigate to Reputation via drawer (READ — second entry) | EXPECTED: Reputation reloads without crash
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- tapOn: "Reputation"
- waitForAnimationToEnd
- assertVisible: "Reputation"

# SCENARIO: Username correct on second visit (READ — consistency check) | EXPECTED: 'wilacok854' visible
- assertVisible: "wilacok854"

# SCENARIO: Rank correct on second visit (READ — consistency check) | EXPECTED: 'Recruit' visible
- assertVisible: "Recruit"

# SCENARIO: Leaderboard accessible on second Reputation visit (READ) | EXPECTED: 'View Leaderboard' link still visible
- assertVisible: "View Leaderboard"

# SCENARIO: Back from Reputation returns to home | EXPECTED: 'Explore OMRE Modules' visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
