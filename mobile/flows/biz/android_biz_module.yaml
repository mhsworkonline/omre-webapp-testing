appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Biz module is listed in module switcher | EXPECTED: 'Biz' option visible in switcher
- assertVisible: "Biz"

# SCENARIO: Tap Biz to enter Biz module (index 1 to skip module bar) | EXPECTED: Biz module loads without crash
- tapOn:
    text: "Biz"
    index: 1
- waitForAnimationToEnd

# SCENARIO: Biz module loads without error (READ) | EXPECTED: No error overlay — module renders
- waitForAnimationToEnd

# SCENARIO: Biz primary CTA is visible (READ) | EXPECTED: 'Continue to Omre Web' button accessible
- assertVisible: "Continue to Omre Web"

# SCENARIO: Biz screen is scrollable down (READ) | EXPECTED: Swipe up reveals content below fold
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll further down Biz screen (READ) | EXPECTED: More content or features visible
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll back to top of Biz screen (READ) | EXPECTED: CTA visible again at top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Continue to Omre Web"

# SCENARIO: Tap Continue to Omre Web — enter Biz web view (READ — web view entry) | EXPECTED: Web view or Biz portal opens
- tapOn: "Continue to Omre Web"
- waitForAnimationToEnd

# SCENARIO: Biz web view loads without crash (READ) | EXPECTED: Screen renders new content without crash
- waitForAnimationToEnd

# SCENARIO: Scroll down in Biz web view (READ) | EXPECTED: Web view content scrollable
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll back up in Biz web view (READ) | EXPECTED: Returns to top of web view
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: Back from Biz web view returns to Biz module (READ cleanup) | EXPECTED: 'Continue to Omre Web' visible again
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Continue to Omre Web"

# SCENARIO: Re-enter Biz web view (READ — second entry) | EXPECTED: Web view reopens without crash
- tapOn: "Continue to Omre Web"
- waitForAnimationToEnd

# SCENARIO: Scroll through Biz web view on second visit (READ) | EXPECTED: Content scrollable on revisit
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: Back from second Biz web view visit (READ cleanup) | EXPECTED: Biz module screen visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Continue to Omre Web"

# SCENARIO: Back from Biz module to home screen | EXPECTED: 'Explore OMRE Modules' visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Re-enter Biz via module switcher second time (READ — re-entry consistency) | EXPECTED: Biz loads correctly
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn:
    text: "Biz"
    index: 1
- waitForAnimationToEnd
- assertVisible: "Continue to Omre Web"

# SCENARIO: Biz module stable on second visit (READ — stability) | EXPECTED: CTA still accessible, no crash
- waitForAnimationToEnd

# SCENARIO: Scroll Biz on second visit (READ) | EXPECTED: Screen still scrollable without crash
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Continue to Omre Web"

# SCENARIO: Back from Biz on second visit to home | EXPECTED: Home screen loads cleanly
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
