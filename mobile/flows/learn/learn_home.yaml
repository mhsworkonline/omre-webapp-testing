appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: View all visible
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Learn module navigates from switcher | EXPECTED: Tapping 'Learn' opens Learn module
- tapOn:
    text: "Learn"
    index: 1
- waitForAnimationToEnd
- waitForAnimationToEnd

# SCENARIO: Learn module loads without crash | EXPECTED: No error screen
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Learn heading visible | EXPECTED: 'Learn' heading shown
- assertVisible: "Learn"

# SCENARIO: Scroll down through Learn content | EXPECTED: Scroll works without crash
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Scroll back to top | EXPECTED: Swipe down returns to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Learn"

# SCENARIO: Tap first content item | EXPECTED: Opens without crash
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: Back to Social Home | EXPECTED: Back navigates home
- pressKey: Back
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "View all"
