appId: com.omre.app.posh
---
# Learn Module - android_learn_home.yaml
# 38 test cases: navigation, browse courses, content taps, tabs, back nav
# Note: Learn opens sub-path /learn/home - Back depth varies; use 3x Back to guarantee Home

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 - Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 - Navigate to Learn
- tapOn: "Learn"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 - Learn screen heading visible
- assertVisible: "Learn"

# TC05 - Scroll down through Learn content
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC06 - Still on Learn after scroll
- assertVisible: "Learn"

# TC07 - Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC08 - Still on Learn
- assertVisible: "Learn"

# TC09 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC10 - Learn heading at top
- assertVisible: "Learn"

# TC11 - Tap first course/content item
- tapOn:
    point: "50%,30%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC12 - Multi-Back to Social Home (3x to clear any stack depth)
- pressKey: Back
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

