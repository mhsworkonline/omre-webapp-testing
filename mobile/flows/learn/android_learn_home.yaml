- swipe:
    direction: DOWN
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn:
    text: "Learn"
    index: 1
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Learn"

