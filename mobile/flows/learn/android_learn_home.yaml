appId: com.omre.app.posh
---
# Learn Module — android_learn_home.yaml
# 35+ test cases: navigation, browse courses, enroll,
# search, categories, progress, back nav

# TC01 — Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 — Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 — Navigate to Learn
- tapOn: "Learn"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 — Learn screen heading visible
- assertVisible: "Learn"

# TC05 — Scroll down through Learn content
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC06 — Still on Learn after scroll
- assertVisible: "Learn"

# TC07 — Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC08 — Still on Learn
- assertVisible: "Learn"

# TC09 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC10 — Learn heading at top
- assertVisible: "Learn"

# TC11 — Tap first course/content item
- tapOn:
    point: "50%,30%"
- waitForAnimationToEnd

# TC12 — Back to Learn
- pressKey: Back
- waitForAnimationToEnd

# TC13 — Back on Learn
- assertVisible: "Learn"

# TC14 — Tap second course
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# TC15 — Back to Learn
- pressKey: Back
- waitForAnimationToEnd

# TC16 — Still on Learn
- assertVisible: "Learn"

# TC17 — Tap third course
- tapOn:
    point: "50%,70%"
- waitForAnimationToEnd

# TC18 — Back to Learn
- pressKey: Back
- waitForAnimationToEnd

# TC19 — Still on Learn
- assertVisible: "Learn"

# TC20 — Enroll/save first course (bookmark ~80%,30%)
- tapOn:
    point: "80%,30%"
- waitForAnimationToEnd

# TC21 — Learn still visible after enroll
- assertVisible: "Learn"

# TC22 — Tap search icon (top-right ~88%,9%)
- tapOn:
    point: "88%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC23 — Back on Learn after search
- assertVisible: "Learn"

# TC24 — Tap category/filter tab (second tab)
- tapOn:
    point: "30%,18%"
- waitForAnimationToEnd

# TC25 — Learn visible in filtered view
- assertVisible: "Learn"

# TC26 — Tap first item in filtered view
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC27 — Back on Learn
- assertVisible: "Learn"

# TC28 — Tap third category tab
- tapOn:
    point: "55%,18%"
- waitForAnimationToEnd

# TC29 — Learn visible
- assertVisible: "Learn"

# TC30 — Scroll down in this category
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC31 — Learn still accessible
- assertVisible: "Learn"

# TC32 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC33 — Tap first tab to reset
- tapOn:
    point: "10%,18%"
- waitForAnimationToEnd

# TC34 — Learn heading visible in default view
- assertVisible: "Learn"

# TC35 — Scroll to bottom
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC36 — Learn intact at bottom
- assertVisible: "Learn"

# TC37 — Scroll back up
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC38 — Back to home
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
