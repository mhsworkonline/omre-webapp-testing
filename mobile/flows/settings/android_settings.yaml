appId: com.omre.app.posh
---
# Settings Module - android_settings.yaml
# Settings is in the drawer below the fold; scroll drawer before tapping

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC02 - Home screen loaded
- assertVisible: "View all"

# TC03 - Open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 - Scroll drawer
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC05 - Settings visible in drawer
- assertVisible: "Settings"

# TC06 - Tap Settings
- tapOn: "Settings"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC07 - Settings screen loaded without crash
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC08 - Settings module loaded
- assertNotVisible: "Something went wrong"

# TC09 - Scroll settings down
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC10 - Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC11 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC12 - Settings screen loads without error
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC13 - Scroll Settings to check more options
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC14 - Scroll back to top of Settings
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC15 - Scroll settings after returning
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC16 - Back exits Settings to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC17 - Scroll to top of Social Home to reveal View all
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "View all"

# TC18 - Second visit: open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC19 - Scroll drawer to reveal Settings (2 swipes needed)
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertVisible: "Settings"

# TC20 - Tap Settings second visit
- tapOn: "Settings"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC21 - Settings stable on second visit
- assertVisible: "Settings"
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC22 - Scroll settings second visit
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC23 - Back from Settings second visit
- pressKey: Back
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "View all"
