appId: com.omre.app.posh
---
- launchApp:
    clearState: false

- assertVisible: "For You"

# Open drawer → Settings
- tapOn: "Open navigation menu"
- tapOn: "Settings"

- assertVisible: "Settings"
- assertNotVisible: "Welcome back"

# Scroll to reveal all sections
- scroll
- scroll
- swipe:
    direction: DOWN

- assertVisible: "Settings"

# Open Notifications
- tapOn: "Notifications"
- assertVisible: "Notifications"
- pressKey: Back
- assertVisible: "Settings"

# Open Your Avatar
- tapOn: "Your Avatar"
- assertVisible: "Avatar"
- pressKey: Back
- assertVisible: "Settings"

# Scroll to APP section and check Notifications setting
- scroll
- tapOn: "Notifications"
- assertVisible: "Notifications"
- pressKey: Back

# Back to feed
- pressKey: Back
- assertVisible: "For You"
