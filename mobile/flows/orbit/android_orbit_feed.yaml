appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Orbit module is listed in module switcher | EXPECTED: 'Orbit' option visible in switcher list
- assertVisible: "Orbit"

# SCENARIO: Orbit module entry navigates to Orbit | EXPECTED: Tapping 'Orbit' opens Orbit module
- tapOn: "Orbit"
- waitForAnimationToEnd

# SCENARIO: Orbit module name appears in top bar | EXPECTED: 'Orbit' label visible in module header
- assertVisible: "Orbit"

# SCENARIO: Orbit onboarding or feed loads without crash | EXPECTED: Screen renders without error overlay
- assertNotVisible: "Something went wrong"

# SCENARIO: Orbit feed 'For You' tab is present | EXPECTED: 'For You' tab visible as single-line label
- assertVisible: "For You"

# SCENARIO: Orbit feed 'Following' tab is present | EXPECTED: 'Following' tab visible as single-line label
- assertVisible: "Following"

# SCENARIO: For You tab is tappable and activates | EXPECTED: Tapping 'For You' selects that tab without crash
- tapOn: "For You"
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Following tab switches feed view | EXPECTED: Tapping 'Following' switches to following content
- tapOn: "Following"
- waitForAnimationToEnd
- assertVisible: "Following"

# SCENARIO: For You tab restores discovery feed | EXPECTED: Tapping 'For You' returns to discovery content
- tapOn: "For You"
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Orbit feed is scrollable downward | EXPECTED: Scroll down works without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Orbit feed scrolls further down | EXPECTED: Second scroll continues without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Orbit feed scrolls back to top | EXPECTED: Swipe down returns toward top of feed
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Pull to refresh triggers feed reload | EXPECTED: Feed refreshes without crash and tabs remain visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Following tab functions after scroll and refresh | EXPECTED: Following tab still tappable and loads content
- tapOn: "Following"
- waitForAnimationToEnd
- assertVisible: "Following"

# SCENARIO: Following feed is scrollable | EXPECTED: Scroll down on Following tab works without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Following feed scrolls back to top | EXPECTED: Swipe down restores top of Following feed
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Following"

# SCENARIO: No error state visible on Orbit feed | EXPECTED: 'Something went wrong' not present
- assertNotVisible: "Something went wrong"

# SCENARIO: No crash dialog visible on Orbit feed | EXPECTED: App crash overlay not present
- assertNotVisible: "Unfortunately"

# SCENARIO: Back navigation returns to home from Orbit | EXPECTED: Pressing Back exits Orbit and home screen loads
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
