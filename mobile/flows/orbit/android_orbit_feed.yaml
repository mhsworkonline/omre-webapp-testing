appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Orbit module is listed in module switcher | EXPECTED: 'Orbit' option visible in switcher
- assertVisible: "Orbit"

# SCENARIO: Tap Orbit to enter Orbit module (READ — enter) | EXPECTED: Orbit module loads without crash
- tapOn: "Orbit"
- waitForAnimationToEnd

# SCENARIO: Orbit module name visible in header (READ) | EXPECTED: 'Orbit' label visible on screen
- assertVisible: "Orbit"

# SCENARIO: For You tab is present on Orbit feed (READ) | EXPECTED: 'For You' tab visible as single-line label
- assertVisible: "For You"

# SCENARIO: Following tab is present on Orbit feed (READ) | EXPECTED: 'Following' tab visible
- assertVisible: "Following"

# SCENARIO: Tap For You tab to view discovery content (READ) | EXPECTED: For You tab activates without crash
- tapOn: "For You"
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: For You feed is scrollable (READ) | EXPECTED: Swipe up scrolls feed without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Like the first visible Orbit post (UPDATE — toggle on) | EXPECTED: Like registers without crash
- tapOn: "Like"
- waitForAnimationToEnd

# SCENARIO: Unlike the post to restore original state (UPDATE — toggle off) | EXPECTED: Unlike registers without crash
- tapOn: "Like"
- waitForAnimationToEnd

# SCENARIO: Open comments on the first Orbit post (READ — comment section) | EXPECTED: Comments open without crash
- tapOn: "Comment"
- waitForAnimationToEnd

# SCENARIO: Tap comment input to start typing (CREATE — comment setup) | EXPECTED: Keyboard appears
- tapOn:
    point: "50%,90%"
- waitForAnimationToEnd

# SCENARIO: Type a comment on the Orbit post (CREATE) | EXPECTED: Text appears in comment field
- inputText: "Interesting perspective!"
- waitForAnimationToEnd

# SCENARIO: Submit the Orbit comment (CREATE) | EXPECTED: Comment posted to thread
- tapOn: "Post"
- waitForAnimationToEnd

# SCENARIO: Comment thread visible after posting (READ — verify) | EXPECTED: Comments area shows without crash
- waitForAnimationToEnd

# SCENARIO: Close comment section (READ cleanup) | EXPECTED: Returns to Orbit feed
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Scroll further down For You feed (READ) | EXPECTED: More posts visible
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Like a second Orbit post (UPDATE) | EXPECTED: Like registers on second post without crash
- tapOn: "Like"
- waitForAnimationToEnd

# SCENARIO: Scroll back to top of For You feed (READ) | EXPECTED: Feed scrolls back, For You tab visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Tap Following tab to view followed content (READ) | EXPECTED: Following tab activates, content loads
- tapOn: "Following"
- waitForAnimationToEnd
- assertVisible: "Following"

# SCENARIO: Following feed is scrollable (READ) | EXPECTED: Swipe up scrolls Following feed without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Scroll Following feed back to top (READ) | EXPECTED: Following tab heading still visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Following"

# SCENARIO: Switch back to For You from Following (READ) | EXPECTED: For You tab reactivates
- tapOn: "For You"
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Create a new Orbit post — tap compose button (CREATE — initiate) | EXPECTED: Post composer opens
- tapOn:
    point: "88%,88%"
- waitForAnimationToEnd

# SCENARIO: Type content for new Orbit post (CREATE) | EXPECTED: Text appears in Orbit post composer
- inputText: "Testing Orbit post creation"
- waitForAnimationToEnd

# SCENARIO: Cancel and discard the draft (CREATE — cancel) | EXPECTED: Returns to Orbit feed without posting
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Pull to refresh Orbit For You feed (READ) | EXPECTED: Feed refreshes, For You tab visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "For You"

# SCENARIO: Back from Orbit returns to home | EXPECTED: 'Explore OMRE Modules' visible
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
