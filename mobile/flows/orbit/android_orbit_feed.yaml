appId: com.omre.app.posh
---
# Orbit/Explore — android_orbit_feed.yaml
# 38 test cases: navigation, Explore tabs (coord taps), search,
# scroll, post interactions, back nav
# Screen heading: "Explore" | Tabs by coord: ForYou=10%,20% Trending=28%,20% Reels=45%,20% Posts=60%,20% Discover=77%,20%

# TC01 — Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 — Tap Orbit icon in bottom nav
- tapOn:
    point: "30%,95%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC03 — Explore screen heading visible
- assertVisible: "Explore"

# TC04 — Tap search bar by coordinate
- tapOn:
    point: "50%,17%"
- waitForAnimationToEnd

# TC05 — Type search query
- inputText: "OMRE community"
- waitForAnimationToEnd

# TC06 — Back from search
- pressKey: Back
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC07 — Back on Explore
- assertVisible: "Explore"

# TC08 — Scroll down through For You feed
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC09 — Explore still visible
- assertVisible: "Explore"

# TC10 — Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC11 — Still on Explore
- assertVisible: "Explore"

# TC12 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC13 — Explore heading at top
- assertVisible: "Explore"

# TC14 — Tap first post (top-left ~25%,35%)
- tapOn:
    point: "25%,35%"
- waitForAnimationToEnd

# TC15 — Back to Explore
- pressKey: Back
- waitForAnimationToEnd

# TC16 — Back on Explore
- assertVisible: "Explore"

# TC17 — Tap second post (top-right ~75%,35%)
- tapOn:
    point: "75%,35%"
- waitForAnimationToEnd

# TC18 — Back to Explore
- pressKey: Back
- waitForAnimationToEnd

# TC19 — Back on Explore
- assertVisible: "Explore"

# TC20 — Tap third post (bottom-left ~25%,60%)
- tapOn:
    point: "25%,60%"
- waitForAnimationToEnd

# TC21 — Back to Explore
- pressKey: Back
- waitForAnimationToEnd

# TC22 — Switch to Trending tab (coord ~28%,20%)
- tapOn:
    point: "28%,14%"
- waitForAnimationToEnd

# TC23 — Explore still visible in Trending
- assertVisible: "Explore"

# TC24 — Scroll Trending
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC25 — Tap post in Trending
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC26 — Switch to Reels tab (coord ~45%,20%)
- tapOn:
    point: "45%,14%"
- waitForAnimationToEnd

# TC27 — Scroll Reels (full-screen — no Explore heading; scroll only)
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC28 — Back out of Reels to return to Explore tabs
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore"

# TC29 — Reset scroll to top before Posts tab tap
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC29b — Switch to Posts tab (coord ~60%,14%)
- tapOn:
    point: "60%,14%"
- waitForAnimationToEnd

# TC30 — Explore visible in Posts
- assertVisible: "Explore"

# TC31 — Tap first post in Posts tab
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC32 — Switch to Discover tab (coord ~77%,14%)
- tapOn:
    point: "77%,14%"
- waitForAnimationToEnd

# TC33 — Explore visible in Discover
- assertVisible: "Explore"

# TC34 — Scroll Discover content
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC35 — Tap item in Discover
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC36 — Explore still visible after all tabs explored
- assertVisible: "Explore"

# TC37 — Navigate back to home via drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Social"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC38 — Scroll to top of Social home feed
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
