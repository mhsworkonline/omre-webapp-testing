appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Messages screen opens via chat icon | EXPECTED: Tapping 'Messages' navigates to inbox
- tapOn: "Messages"
- waitForAnimationToEnd

# SCENARIO: Social messages filter tab is present | EXPECTED: 'Social' tab visible
- assertVisible: "Social"

# SCENARIO: Orbit messages filter tab is present | EXPECTED: 'Orbit' tab visible
- assertVisible: "Orbit"

# SCENARIO: Business messages filter tab is present | EXPECTED: 'Business' tab visible
- assertVisible: "Business"

# SCENARIO: Jobs messages filter tab is present | EXPECTED: 'Jobs' tab visible
- assertVisible: "Jobs"

# SCENARIO: Orbit filter tab is tappable | EXPECTED: Tapping 'Orbit' switches message filter
- tapOn: "Orbit"
- waitForAnimationToEnd

# SCENARIO: Business filter tab is tappable | EXPECTED: Tapping 'Business' switches message filter
- tapOn: "Business"
- waitForAnimationToEnd

# SCENARIO: Jobs filter tab is tappable | EXPECTED: Tapping 'Jobs' switches message filter
- tapOn: "Jobs"
- waitForAnimationToEnd

# SCENARIO: Social filter tab restores default view | EXPECTED: Tapping 'Social' returns to social messages
- tapOn: "Social"
- waitForAnimationToEnd

# SCENARIO: Messages list is scrollable | EXPECTED: Scroll down works without crash
- scroll

# SCENARIO: Back navigates to home feed | EXPECTED: Pressing Back returns to home screen
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
