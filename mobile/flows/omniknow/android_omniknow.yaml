appId: com.omre.app.posh
---
# SCENARIO: App Launch for OmniKnow | EXPECTED: App launches cleanly without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Open Drawer | EXPECTED: Drawer opens successfully
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd

# SCENARIO: Navigate to OmniKnow | EXPECTED: OmniKnow screen loads
- tapOn: "OmniKnow"
- waitForAnimationToEnd

# SCENARIO: OmniKnow heading visible | EXPECTED: OmniKnow label or heading present
- assertVisible: "OmniKnow"

# SCENARIO: No crash on load | EXPECTED: No error dialogs appear
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Knowledge content visible | EXPECTED: Articles, wiki entries, or AI content shown
- assertNotVisible: "Something went wrong"

# SCENARIO: No unexpected errors on initial view | EXPECTED: Screen renders without errors
- assertNotVisible: "Unfortunately"

# SCENARIO: Scroll down to explore content | EXPECTED: More knowledge items or categories load
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: No crash after scroll down | EXPECTED: App remains stable
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Scroll up to return to top | EXPECTED: Top of OmniKnow visible
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: No error after scroll up | EXPECTED: Screen still stable
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Scroll down further for more content | EXPECTED: Extended knowledge content accessible
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: No crash on extended scroll | EXPECTED: App still running normally
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Scroll back to top | EXPECTED: Returns to top of OmniKnow
- swipe:
    direction: UP
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Back navigation from OmniKnow | EXPECTED: Previous screen loads
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: Re-navigate to OmniKnow via drawer | EXPECTED: OmniKnow reloads correctly
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- tapOn: "OmniKnow"
- waitForAnimationToEnd

# SCENARIO: OmniKnow stable on second visit | EXPECTED: No errors, content visible
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"
