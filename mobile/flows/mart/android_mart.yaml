appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Mart module is listed in module switcher | EXPECTED: 'Mart' option visible in switcher list
- assertVisible: "Mart"

# SCENARIO: Mart module entry navigates to Mart | EXPECTED: Tapping 'Mart' opens Mart/marketplace module
- tapOn: "Mart"
- waitForAnimationToEnd

# SCENARIO: Mart module loads without crash | EXPECTED: No error overlay appears after entering Mart
- assertNotVisible: "Something went wrong"

# SCENARIO: No app crash dialog on Mart module load | EXPECTED: App crash overlay not present
- assertNotVisible: "Unfortunately"

# SCENARIO: Categories section is visible on Mart home | EXPECTED: 'Categories' label present on Mart screen
- assertVisible: "Categories"

# SCENARIO: Top Sellers section is visible on Mart home | EXPECTED: 'Top Sellers' label present on Mart screen
- assertVisible: "Top Sellers"

# SCENARIO: Top Rated Places section is visible | EXPECTED: 'Top Rated Places' label present on Mart screen
- assertVisible: "Top Rated Places"

# SCENARIO: Mart categories row is scrollable horizontally | EXPECTED: Swipe right on categories row works without crash
- swipe:
    direction: RIGHT
- waitForAnimationToEnd

# SCENARIO: Mart categories row scrolls back left | EXPECTED: Swipe left restores categories row without crash
- swipe:
    direction: LEFT
- waitForAnimationToEnd

# SCENARIO: Categories section still visible after horizontal scroll | EXPECTED: 'Categories' label still present after swipe
- assertVisible: "Categories"

# SCENARIO: Mart feed is scrollable downward | EXPECTED: Swipe up scrolls Mart feed without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: No error visible after scrolling Mart feed | EXPECTED: 'Something went wrong' not present after scroll
- assertNotVisible: "Something went wrong"

# SCENARIO: Continue scrolling Mart feed further down | EXPECTED: Second swipe up continues without crash
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Unfortunately"

# SCENARIO: Mart feed scrolls back to top | EXPECTED: Swipe down returns to top of Mart screen
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Categories"

# SCENARIO: Pull to refresh reloads Mart content | EXPECTED: Second swipe down triggers refresh without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Categories"

# SCENARIO: Top Sellers section visible after refresh | EXPECTED: 'Top Sellers' still present after pull to refresh
- assertVisible: "Top Sellers"

# SCENARIO: No crash after refresh on Mart screen | EXPECTED: No crash overlay after pull to refresh
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# SCENARIO: Back from Mart returns to home screen | EXPECTED: Pressing Back exits Mart and home screen loads
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Mart module re-entry via module switcher | EXPECTED: Navigating to Mart a second time loads without crash
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Mart"
- waitForAnimationToEnd
- assertVisible: "Categories"

# SCENARIO: Mart stable on second visit | EXPECTED: No crash and marketplace content visible on second visit
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Top Sellers section persists on second visit | EXPECTED: 'Top Sellers' still visible on re-navigation
- assertVisible: "Top Sellers"

# SCENARIO: Back from Mart second visit returns to home | EXPECTED: Home screen loads cleanly after second Mart visit
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
