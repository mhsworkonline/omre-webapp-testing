appId: com.omre.app.posh
---
# Mart Module - android_mart.yaml
# "Browse Mart" -> "Explore categories" grid
# Back from any category detail -> Social Home (not categories)
# Max 4 stopApp cycles to avoid ANR

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC02 - Module switcher entry visible
- assertVisible: "View all"

# TC03 - Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# TC04 - Mart listed in switcher
- assertVisible: "Mart"

# TC05 - Navigate to Mart welcome
- tapOn: "Mart"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC06 - Mart landing CTAs visible
- assertVisible: "Browse Mart"
- assertVisible: "Categories"

# TC07 - Enter categories view
- tapOn: "Browse Mart"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC08 - First visible category present
- assertVisible: "Restaurants"

# TC09 - Scroll categories grid down
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC10 - Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Unfortunately"

# TC11 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Restaurants"

# TC12 - Tap first category item (~25%,30%)
- tapOn:
    point: "25%,30%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC13 - Re-nav cycle 1 (Back from category -> Social Home)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Mart"
- waitForAnimationToEnd
- tapOn: "Browse Mart"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Restaurants"

# TC14 - Tap second category item (~75%,30%)
- tapOn:
    point: "75%,30%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC15 - Re-nav cycle 2
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Mart"
- waitForAnimationToEnd
- tapOn: "Browse Mart"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Restaurants"

# TC16 - Scroll and tap third item (~25%,50%)
- swipe:
    direction: UP
- waitForAnimationToEnd
- tapOn:
    point: "25%,50%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC17 - Tap fourth item (~75%,50%)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Mart"
- waitForAnimationToEnd
- tapOn: "Browse Mart"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn:
    point: "75%,50%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC18 - Re-nav cycle 3 (final)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC19 - Re-navigate to Mart categories
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Mart"
- waitForAnimationToEnd
- tapOn: "Browse Mart"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC20 - Categories stable on third visit
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"
- assertVisible: "Restaurants"

# TC21 - Scroll down
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC22 - Scroll further
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC23 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Restaurants"

# TC24 - Tap item in lower area (~25%,70%)
- tapOn:
    point: "25%,70%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC25 - Re-nav cycle 4 (final check)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Mart"
- waitForAnimationToEnd
- tapOn: "Browse Mart"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Restaurants"
- assertNotVisible: "Something went wrong"

# TC26 - Tap item at ~75%,70%
- tapOn:
    point: "75%,70%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC27 - Module switcher accessible from Social Home
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- pressKey: Back
- waitForAnimationToEnd
