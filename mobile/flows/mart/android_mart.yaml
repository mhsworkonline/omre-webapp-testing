appId: com.omre.app.posh
---
# Mart Module - android_mart.yaml
# "Browse Mart" -> "Explore categories" grid
# Back from any category detail -> Social Home (not categories)
# Max 4 stopApp cycles to avoid ANR

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC02 - Module switcher entry visible
- assertVisible: "View all"

# TC03 - Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# TC04 - Mart listed in switcher
- assertVisible: "Mart"

# TC05 - Navigate to Mart welcome
- tapOn: "Mart"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC06 - Mart landing CTAs visible
- assertVisible: "Browse Mart"
- assertVisible: "Categories"

# TC07 - Enter categories view
- tapOn: "Browse Mart"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC08 - First visible category present
- assertNotVisible: "Something went wrong"

# TC09 - Scroll categories grid down
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC10 - Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Unfortunately"

# TC11 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC12 - Tap first category item (~25%,30%)
- tapOn:
    point: "25%,30%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC13 - Back to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC14 - Tap second category item (~75%,30%)
- tapOn:
    point: "75%,30%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC15 - Back to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC16 - Scroll and tap third item (~25%,50%)
- swipe:
    direction: UP
- waitForAnimationToEnd
- tapOn:
    point: "25%,50%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC17 - Back to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC18 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
