appId: com.omre.app.posh
---
# Business Suite Module
# Business Suite is just below Reputation on initial drawer open
# Use short swipe (20% scroll) to reveal it without overshooting to ESSENTIALS

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC02 - Open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC03 - Short scroll to reveal Business Suite
- swipe:
    start: "50%,80%"
    end: "50%,60%"
    duration: 600
- waitForAnimationToEnd

# TC04 - Business Suite visible in drawer
- assertVisible: "Business Suite"

# TC05 - Tap Business Suite
- tapOn: "Business Suite"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC06 - No crash on load
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC07 - Business Suite heading visible
- assertVisible: "Business Suite"

# TC08 - Scroll down
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# TC09 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC10 - Tap first item
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC11 - Back from detail
- pressKey: Back
- waitForAnimationToEnd

# TC12 - Tap second item
- tapOn:
    point: "50%,60%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC13 - Back from detail
- pressKey: Back
- waitForAnimationToEnd

# TC14 - Back to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC15 - Scroll to top of Social Home
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "View all"

# TC16 - Second visit: open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC17 - Short scroll to reveal Business Suite
- swipe:
    start: "50%,80%"
    end: "50%,60%"
    duration: 600
- waitForAnimationToEnd
- assertVisible: "Business Suite"

# TC18 - Tap Business Suite second visit
- tapOn: "Business Suite"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC19 - Stable on second visit
- assertVisible: "Business Suite"
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC20 - Scroll and return
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC21 - Back from second visit
- pressKey: Back
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"