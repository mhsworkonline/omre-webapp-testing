appId: com.omre.app.posh
---
# SCENARIO: A valid password is in place so only the email format is being tested | EXPECTED: App launches and the password and email fields can be set up
- launchApp:
    clearState: false
    label: "Open the OMRE app"
- tapOn:
    text: "Password"
    label: "Tap the password field"
- eraseText:
    charactersToErase: 200
    label: "Clear the password field"
- inputText:
    text: "Password123"
    label: "Type a valid password"
# Switch focus to email field (keyboard stays open on email)
- tapOn:
    text: "name@example.com"
    label: "Tap the email field"
- eraseText:
    charactersToErase: 200
    label: "Clear the email field"

# SCENARIO: Email with no @ symbol is rejected | EXPECTED: Login is rejected and the user stays on the login screen
- inputText:
    text: "notanemail"
    label: "Type an email with no @ symbol"
- tapOn:
    text: "Log in"
    label: "Tap Log in with the invalid email"
- assertVisible:
    text: "Log in"
    label: "Confirm still on the login screen"
- assertNotVisible:
    text: "Feed"
    label: "Confirm we did not log in"
- eraseText:
    charactersToErase: 200
    label: "Clear the email field"

# SCENARIO: Email with no domain after @ is rejected | EXPECTED: Login is rejected and the user stays on the login screen
- inputText:
    text: "user@"
    label: "Type an email with no domain after @"
- tapOn:
    text: "Log in"
    label: "Tap Log in with the invalid email"
- assertVisible:
    text: "Log in"
    label: "Confirm still on the login screen"
- assertNotVisible:
    text: "Feed"
    label: "Confirm we did not log in"
- eraseText:
    charactersToErase: 200
    label: "Clear the email field"

# SCENARIO: Email with no top-level domain is rejected | EXPECTED: Login is rejected and the user stays on the login screen
- inputText:
    text: "user@domain"
    label: "Type an email with no top-level domain"
- tapOn:
    text: "Log in"
    label: "Tap Log in with the invalid email"
- assertVisible:
    text: "Log in"
    label: "Confirm still on the login screen"
- assertNotVisible:
    text: "Feed"
    label: "Confirm we did not log in"
- eraseText:
    charactersToErase: 200
    label: "Clear the email field"

# SCENARIO: Email with a space inside it is rejected | EXPECTED: Login is rejected and the user stays on the login screen
- inputText:
    text: "user name@example.com"
    label: "Type an email containing a space"
- tapOn:
    text: "Log in"
    label: "Tap Log in with the invalid email"
- assertVisible:
    text: "Log in"
    label: "Confirm still on the login screen"
- assertNotVisible:
    text: "Feed"
    label: "Confirm we did not log in"
- eraseText:
    charactersToErase: 200
    label: "Clear the email field"

# SCENARIO: Email with a double @ symbol is rejected | EXPECTED: Login is rejected and the user stays on the login screen
- inputText:
    text: "user@@example.com"
    label: "Type an email with a double @ symbol"
- tapOn:
    text: "Log in"
    label: "Tap Log in with the invalid email"
- assertVisible:
    text: "Log in"
    label: "Confirm still on the login screen"
- assertNotVisible:
    text: "Feed"
    label: "Confirm we did not log in"
- eraseText:
    charactersToErase: 200
    label: "Clear the email field"

# SCENARIO: Field recovers once a valid email format is entered | EXPECTED: A correctly formatted email is accepted and displayed without error
- inputText:
    text: "valid@example.com"
    label: "Type a valid email to confirm the field recovers"
- assertVisible:
    text: "valid@example.com"
    label: "Confirm the valid email is shown"
- eraseText:
    charactersToErase: 200
    label: "Clear the email field"
