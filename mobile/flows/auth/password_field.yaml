appId: com.omre.app.posh
---
# SCENARIO: App opens with an empty, clearable password field | EXPECTED: App launches and the password field can be cleared
- launchApp:
    clearState: false
    label: "Open the OMRE app"
- tapOn:
    text: "Password"
    label: "Tap the password field"
- eraseText:
    charactersToErase: 200
    label: "Clear the password field"

# SCENARIO: Password is masked by default | EXPECTED: Typed password text is not shown in plain text
- inputText:
    text: "MySecret123"
    label: "Type a password"
- assertNotVisible:
    text: "MySecret123"
    label: "Confirm the password is masked"

# SCENARIO: Show/hide password toggle reveals and re-masks the password | EXPECTED: Toggling shows the password as plain text, and hides it again
- tapOn:
    text: "Show password"
    label: "Tap the show-password toggle"
- assertVisible:
    text: "MySecret123"
    label: "Confirm the password is now visible"
- tapOn:
    text: "Hide password"
    label: "Tap the hide-password toggle"
- assertNotVisible:
    text: "MySecret123"
    label: "Confirm the password is masked again"

# SCENARIO: Show/hide toggle remains stable across repeated use | EXPECTED: The toggle continues to show and hide the password correctly on repeated taps
- tapOn:
    text: "Show password"
    label: "Tap the show-password toggle again"
- assertVisible:
    text: "MySecret123"
    label: "Confirm the password is visible again"
- tapOn:
    text: "Hide password"
    label: "Tap the hide-password toggle again"
- assertNotVisible:
    text: "MySecret123"
    label: "Confirm the password is masked again"

# SCENARIO: Toggling the password visibility does not navigate away from login | EXPECTED: The login screen and its fields remain visible throughout
- assertVisible:
    text: "Log in"
    label: "Confirm still on the login screen"
- assertVisible:
    text: "name@example.com"
    label: "Confirm the email field is still present"

# SCENARIO: Password with special characters is accepted | EXPECTED: A password containing special characters is accepted and shown correctly when revealed
- eraseText:
    charactersToErase: 200
    label: "Clear the password field"
- inputText:
    text: "P@$$w0rd!#%&"
    label: "Type a password with special characters"
- tapOn:
    text: "Show password"
    label: "Tap the show-password toggle"
- assertVisible:
    text: "P@$$w0rd!#%&"
    label: "Confirm the special-character password is shown"
- tapOn:
    text: "Hide password"
    label: "Tap the hide-password toggle"

# SCENARIO: Very long password is accepted | EXPECTED: A long password is accepted and shown correctly when revealed, without truncation
- eraseText:
    charactersToErase: 200
    label: "Clear the password field"
- inputText:
    text: "ThisIsAVeryLongPasswordThatShouldBeAccepted1234567890"
    label: "Type a very long password"
- tapOn:
    text: "Show password"
    label: "Tap the show-password toggle"
- assertVisible:
    text: "ThisIsAVeryLongPasswordThatShouldBeAccepted1234567890"
    label: "Confirm the long password is shown"
- tapOn:
    text: "Hide password"
    label: "Tap the hide-password toggle"

# SCENARIO: Field is cleared at the end of the test | EXPECTED: Password field is empty, leaving the app in a clean state
- eraseText:
    charactersToErase: 200
    label: "Clear the password field"
