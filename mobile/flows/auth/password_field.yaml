appId: com.omre.app.posh
---
- launchApp:
    clearState: false

# Clear any pre-existing content
- tapOn: "Password"
- eraseText: 200

# Password is masked by default — raw text must not be visible
- inputText: "MySecret123"
- assertNotVisible: "MySecret123"

# Reveal password via toggle
- tapOn: "Show password"
- assertVisible: "MySecret123"

# Toggle back — now labeled "Hide password"
- tapOn: "Hide password"
- assertNotVisible: "MySecret123"

# Cycle again to verify stability
- tapOn: "Show password"
- assertVisible: "MySecret123"
- tapOn: "Hide password"
- assertNotVisible: "MySecret123"

# Toggling did not navigate away from login
- assertVisible: "Log in"
- assertVisible: "name@example.com"

# Special characters accepted
- eraseText: 200
- inputText: "P@$$w0rd!#%&"
- tapOn: "Show password"
- assertVisible: "P@$$w0rd!#%&"
- tapOn: "Hide password"

# Very long password accepted
- eraseText: 200
- inputText: "ThisIsAVeryLongPasswordThatShouldBeAccepted1234567890"
- tapOn: "Show password"
- assertVisible: "ThisIsAVeryLongPasswordThatShouldBeAccepted1234567890"
- tapOn: "Hide password"

# Cleanup
- eraseText: 200
