appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen is in correct starting state | EXPECTED: 'Explore OMRE Modules' visible on home
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Navigation drawer opens via hamburger icon | EXPECTED: Drawer slides open showing nav items
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd

# SCENARIO: Blogs item is visible in drawer | EXPECTED: 'Blogs' label visible in open drawer
- assertVisible: "Blogs"

# SCENARIO: Tap Blogs navigates to Blogs screen | EXPECTED: Blogs screen loads without crash
- tapOn: "Blogs"
- waitForAnimationToEnd

# SCENARIO: Blogs screen header is visible | EXPECTED: 'Blogs' or 'Omre Blogs' heading present on screen
- assertVisible: "Omre Blogs"

# SCENARIO: No crash dialog shown on Blogs load | EXPECTED: App crash overlay not visible
- assertNotVisible: "Unfortunately"

# SCENARIO: No generic error shown on Blogs load | EXPECTED: Error banner not visible
- assertNotVisible: "Something went wrong"

# SCENARIO: No crash or error on Blogs load | EXPECTED: No error or crash overlay present
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# SCENARIO: Scroll down Blogs list | EXPECTED: Swipe up scrolls without crash, more blog cards visible below
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: No crash after scrolling Blogs list | EXPECTED: Crash overlay not visible after scroll
- assertNotVisible: "Unfortunately"

# SCENARIO: No error after scrolling Blogs list | EXPECTED: Error banner not visible after scroll
- assertNotVisible: "Something went wrong"

# SCENARIO: Scroll back to top of Blogs screen | EXPECTED: Swipe down returns to top, Blogs heading visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Omre Blogs"

# SCENARIO: Pull to refresh reloads Blogs content | EXPECTED: Content refreshes without crash
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: No crash after pull-to-refresh | EXPECTED: Crash overlay not visible after refresh
- assertNotVisible: "Unfortunately"

# SCENARIO: No error after pull-to-refresh | EXPECTED: Error banner not visible after refresh
- assertNotVisible: "Something went wrong"

# SCENARIO: Blogs heading still visible after pull-to-refresh | EXPECTED: 'Omre Blogs' heading still present
- assertVisible: "Omre Blogs"

# SCENARIO: Press Back from Blogs returns to home | EXPECTED: Home screen visible after pressing Back
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# SCENARIO: No lingering error on home after leaving Blogs | EXPECTED: Crash and error overlays absent on home screen
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# SCENARIO: Re-open drawer after returning to home | EXPECTED: Drawer opens correctly from home screen
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd

# SCENARIO: Blogs item still visible in drawer on second visit | EXPECTED: 'Blogs' label visible in drawer
- assertVisible: "Blogs"

# SCENARIO: Tap Blogs re-navigates to Blogs screen | EXPECTED: Blogs screen loads again without crash
- tapOn: "Blogs"
- waitForAnimationToEnd
- assertVisible: "Omre Blogs"

# SCENARIO: No crash on second navigation to Blogs | EXPECTED: Crash overlay not visible on re-entry
- assertNotVisible: "Unfortunately"

# SCENARIO: No error on second navigation to Blogs | EXPECTED: Error banner not visible on re-entry
- assertNotVisible: "Something went wrong"

# SCENARIO: Back from re-navigated Blogs returns to home cleanly | EXPECTED: 'Explore OMRE Modules' visible, no error state
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"
