appId: com.omre.app.posh
---
- launchApp:
    clearState: false
- waitForAnimationToEnd

# Verify home screen
- assertVisible: "Explore OMRE Modules"
- assertVisible: "View all"
- assertVisible: "Social"
- assertVisible: "Chat"
- assertVisible: "Biz"
- assertVisible: "Learn"
- assertVisible: "Refresh feed"

# Open module switcher — verify all 12 modules
- tapOn: "View all"
- assertVisible: "Switch to Module"
- assertVisible: "Social"
- assertVisible: "Chat"
- assertVisible: "Biz"
- assertVisible: "Link"
- assertVisible: "Learn"
- assertVisible: "Studio"
- assertVisible: "News"
- assertVisible: "Video"
- assertVisible: "Orbit"
- assertVisible: "Games"
- assertVisible: "Meeting"
- assertVisible: "Mart"

# Close module switcher
- pressKey: Back
- waitForAnimationToEnd

# Scroll feed
- scroll
- scroll
