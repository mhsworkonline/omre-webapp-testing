appId: com.omre.app.posh
---
# Happy Corner Module (physical device)
# Needs 1 full swipe(s) to reveal in drawer

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC02 - Open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC03 - Scroll drawer
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC04 - Happy Corner visible in drawer
- assertVisible: "Happy Corner"

# TC05 - Tap Happy Corner
- tapOn: "Happy Corner"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC06 - No crash on load
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC07 - Happy Corner heading visible
- assertVisible: "Community Pulse"

# TC08 - Scroll down
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# TC09 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC10 - Tap first item
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC11 - Back from detail
- pressKey: Back
- waitForAnimationToEnd

# TC12 - Tap second item
- tapOn:
    point: "50%,60%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC13 - Back from detail
- pressKey: Back
- waitForAnimationToEnd

# TC14 - Back to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC15 - Scroll to top of Social Home
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "View all"

# TC16 - Second visit: open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC17 - Scroll drawer
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertVisible: "Happy Corner"

# TC18 - Tap Happy Corner second visit
- tapOn: "Happy Corner"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC19 - Stable on second visit
- assertVisible: "Community Pulse"
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC20 - Scroll and return
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC21 - Back from second visit
- pressKey: Back
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"