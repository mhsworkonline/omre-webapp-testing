appId: com.omre.app.posh
---
# Video Module — android_video.yaml
# 35+ test cases: navigation, browse videos, play, like,
# comment, share, upload, back nav

# TC01 — Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 — Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 — Navigate to Video
- tapOn: "Video"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 — Video screen heading visible
- assertVisible: "Video"

# TC05 — Scroll down through video feed
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC06 — Still on Video after scroll
- assertVisible: "Video"

# TC07 — Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC08 — Still on Video
- assertVisible: "Video"

# TC09 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC10 — Video heading at top
- assertVisible: "Video"

# TC11 — Tap first video to play
- tapOn:
    point: "50%,30%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC12 — Back from video player
- pressKey: Back
- waitForAnimationToEnd

# TC13 — Back on Video feed
- assertVisible: "Video"

# TC14 — Tap second video
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC15 — Back from video player
- pressKey: Back
- waitForAnimationToEnd

# TC16 — Back on Video
- assertVisible: "Video"

# TC17 — Like first video (~88%,30%)
- tapOn:
    point: "88%,30%"
- waitForAnimationToEnd

# TC18 — Video still visible after like
- assertVisible: "Video"

# TC19 — Unlike (toggle)
- tapOn:
    point: "88%,30%"
- waitForAnimationToEnd

# TC20 — Comment on first video (~88%,40%)
- tapOn:
    point: "88%,40%"
- waitForAnimationToEnd

# TC21 — Back from comments
- pressKey: Back
- waitForAnimationToEnd

# TC22 — Back on Video
- assertVisible: "Video"

# TC23 — Share first video (~88%,50%)
- tapOn:
    point: "88%,50%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC24 — Back on Video after share
- assertVisible: "Video"

# TC25 — Tap search/filter icon (top-right)
- tapOn:
    point: "88%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC26 — Back on Video
- assertVisible: "Video"

# TC27 — Tap upload/create video button if present (~75%,9%)
- tapOn:
    point: "75%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC28 — Back on Video
- assertVisible: "Video"

# TC29 — Tap category tab (second tab ~30%,18%)
- tapOn:
    point: "30%,18%"
- waitForAnimationToEnd

# TC30 — Video still accessible in filtered view
- assertVisible: "Video"

# TC31 — Scroll in filtered view
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC32 — Video still visible
- assertVisible: "Video"

# TC33 — Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC34 — Tap first tab to reset
- tapOn:
    point: "10%,18%"
- waitForAnimationToEnd

# TC35 — Scroll to bottom of full feed
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC36 — Video intact at bottom
- assertVisible: "Video"

# TC37 — Scroll back up
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC38 — Back to home
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
