appId: com.omre.app.posh
---
# Link Marketplace Module - android_link_marketplace.yaml
# 38 test cases: navigation, marketplace browse, jobs tab, content taps, back nav
# Uses stopApp+launchApp for re-nav (limited to 4 cycles to avoid ANR)

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC02 - Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 - Navigate to Link
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 - Link landing shows Browse Marketplace CTA
- assertVisible: "Browse Marketplace"

# TC05 - Explore Jobs also visible
- assertVisible: "Explore Jobs"

# TC06 - Tap Browse Marketplace
- tapOn: "Browse Marketplace"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC07 - Marketplace tab active
- assertVisible: "Marketplace"

# TC08 - Jobs tab also visible
- assertVisible: "Jobs"

# TC09 - No crash on marketplace load
- assertNotVisible: "Something went wrong"

# TC10 - Switch to Jobs tab
- tapOn: "Jobs"
- waitForAnimationToEnd
- assertVisible: "Jobs"

# TC11 - Switch back to Marketplace
- tapOn: "Marketplace"
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC12 - Scroll marketplace listings
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC13 - Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC14 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC15 - Tap first marketplace item (~50%,35%)
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC16 - Tap second item (~50%,55%)
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC17 - Tap third item (~50%,70%)
- tapOn:
    point: "50%,70%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC18 - Restart app (re-nav cycle 1)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC19 - Re-navigate to Link Marketplace
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Browse Marketplace"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC20 - Scroll down in marketplace
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC21 - Scroll back up
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC22 - Tap fourth item (~50%,40%)
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC23 - Tap fifth item (~50%,60%)
- tapOn:
    point: "50%,60%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC24 - Restart app (re-nav cycle 2)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC25 - Re-navigate to Link Marketplace
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Browse Marketplace"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC26 - Scroll to bottom
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC27 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC28 - Tab switching Jobs/Marketplace
- tapOn: "Jobs"
- waitForAnimationToEnd
- assertVisible: "Jobs"
- tapOn: "Marketplace"
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC29 - Tap sixth item (~50%,45%)
- tapOn:
    point: "50%,45%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC30 - Tap seventh item (~50%,50%)
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC31 - Restart app (re-nav cycle 3)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC32 - Re-navigate to Link Marketplace
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Browse Marketplace"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC33 - No crash after all navigation
- assertNotVisible: "Something went wrong"

# TC34 - Scroll and verify stability
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC35 - Switch tabs once more
- tapOn: "Jobs"
- waitForAnimationToEnd
- tapOn: "Marketplace"
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC36 - Tap item eight (~50%,35%)
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC37 - Tap item nine (~50%,55%)
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC38 - Module switcher accessible (restart + verify)
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- pressKey: Back
- waitForAnimationToEnd
