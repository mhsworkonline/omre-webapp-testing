appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Link module is listed in module switcher | EXPECTED: 'Link' option visible in switcher list
- assertVisible: "Link"

# SCENARIO: Link module entry navigates to Link | EXPECTED: Tapping 'Link' opens Link module
- tapOn: "Link"
- waitForAnimationToEnd

# SCENARIO: Link module loads without crash | EXPECTED: No error overlay appears after entering Link
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Link onboarding welcome title is shown | EXPECTED: 'Welcome to Link' heading visible
- assertVisible: "Welcome to Link"

# SCENARIO: Browse Marketplace CTA is present on onboarding | EXPECTED: 'Browse Marketplace' button visible
- assertVisible: "Browse Marketplace"

# SCENARIO: Browse Marketplace navigates to Remote Hub | EXPECTED: Tapping 'Browse Marketplace' opens Remote Hub screen
- tapOn: "Browse Marketplace"
- waitForAnimationToEnd

# SCENARIO: Remote Hub screen title is visible | EXPECTED: 'REMOTE HUB' title visible after navigation
- assertVisible: "REMOTE HUB"

# SCENARIO: Marketplace tab is present in Remote Hub | EXPECTED: 'Marketplace' tab visible in Remote Hub tab bar
- assertVisible: "Marketplace"

# SCENARIO: Jobs tab is also present in Remote Hub | EXPECTED: 'Jobs' tab visible alongside Marketplace tab
- assertVisible: "Jobs"

# SCENARIO: Marketplace tab is selected first | EXPECTED: Tapping 'Marketplace' tab shows marketplace content
- tapOn: "Marketplace"
- waitForAnimationToEnd

# SCENARIO: Marketplace tab loads without crash | EXPECTED: No error overlay after navigating to Marketplace tab
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Marketplace screen is scrollable downward | EXPECTED: Swipe up scrolls marketplace content without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Marketplace screen further scroll reveals more content | EXPECTED: Second swipe up continues without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Marketplace screen scrolls back to top | EXPECTED: Swipe down returns toward top of marketplace listings
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# SCENARIO: No crash visible after scrolling Marketplace | EXPECTED: 'Something went wrong' not present after scroll
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Remote Hub title persists throughout Marketplace browsing | EXPECTED: 'REMOTE HUB' header still visible
- assertVisible: "REMOTE HUB"

# SCENARIO: Jobs tab is accessible from Marketplace view | EXPECTED: Tapping 'Jobs' tab switches to job listings
- tapOn: "Jobs"
- waitForAnimationToEnd

# SCENARIO: Jobs tab loads without crash after switching from Marketplace | EXPECTED: No error overlay on Jobs tab
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Switching back to Marketplace from Jobs works | EXPECTED: Tapping 'Marketplace' tab reloads marketplace content
- tapOn: "Marketplace"
- waitForAnimationToEnd

# SCENARIO: Marketplace reloads without crash on second visit | EXPECTED: No error overlay on re-entering Marketplace tab
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Back navigation exits Remote Hub | EXPECTED: Pressing Back returns to Link onboarding or home
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: Back navigation exits Link module | EXPECTED: Pressing Back again returns to home screen
- pressKey: Back
- waitForAnimationToEnd

# SCENARIO: Home screen accessible after back from Link | EXPECTED: 'Explore OMRE Modules' visible after full back navigation
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Link module re-entry via module switcher works | EXPECTED: Second visit to Link opens without crash
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd

# SCENARIO: Link module stable on second visit | EXPECTED: Welcome screen or Link content visible; no crash
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# SCENARIO: Back from Link second visit returns to home | EXPECTED: Home screen loads cleanly after second Link visit
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
