appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Link module navigates from switcher | EXPECTED: Tapping 'Link' opens Link module
- tapOn: "Link"
- waitForAnimationToEnd

# SCENARIO: Link onboarding welcome title is shown | EXPECTED: 'Welcome to Link' heading visible
- assertVisible: "Welcome to Link"

# SCENARIO: Explore Jobs CTA is present on onboarding | EXPECTED: 'Explore Jobs' button visible
- assertVisible: "Explore Jobs"

# SCENARIO: Browse Marketplace CTA is present on onboarding | EXPECTED: 'Browse Marketplace' button visible
- assertVisible: "Browse Marketplace"

# SCENARIO: Explore Jobs navigates to jobs section | EXPECTED: Tapping CTA opens jobs screen
- tapOn: "Explore Jobs"
- waitForAnimationToEnd

# SCENARIO: Job Search navigation item is accessible | EXPECTED: 'Job Search' entry visible
- assertVisible: "Job Search"

# SCENARIO: Saved Jobs navigation item is accessible | EXPECTED: 'Saved Jobs' entry visible
- assertVisible: "Saved Jobs"

# SCENARIO: Job Alerts navigation item is accessible | EXPECTED: 'Job Alerts' entry visible
- assertVisible: "Job Alerts"

# SCENARIO: Company Pages navigation item is accessible | EXPECTED: 'Company Pages' entry visible
- assertVisible: "Company Pages"

# SCENARIO: Jobs screen is scrollable | EXPECTED: Scroll down works without crash
- scroll

# SCENARIO: Jobs screen scrolls back to top | EXPECTED: Swipe down returns to top
- swipe:
    direction: DOWN
