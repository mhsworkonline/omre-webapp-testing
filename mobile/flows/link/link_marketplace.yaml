appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: Link module navigates from switcher | EXPECTED: Tapping 'Link' opens Link module
- tapOn: "Link"
- waitForAnimationToEnd

# SCENARIO: Link onboarding welcome title is shown | EXPECTED: 'Welcome to Link' heading visible
- assertVisible: "Welcome to Link"

# SCENARIO: Browse Marketplace CTA is present on onboarding | EXPECTED: 'Browse Marketplace' button visible
- assertVisible: "Browse Marketplace"

# SCENARIO: Remote Hub screen opens from marketplace CTA | EXPECTED: 'REMOTE HUB' title visible
- tapOn: "Browse Marketplace"
- waitForAnimationToEnd
- assertVisible: "REMOTE HUB"

# SCENARIO: Remote Hub Jobs tab is present | EXPECTED: 'Jobs' tab visible in Remote Hub
- assertVisible: "Jobs"

# SCENARIO: Remote Hub Marketplace tab is present | EXPECTED: 'Marketplace' tab visible in Remote Hub
- assertVisible: "Marketplace"

# SCENARIO: Search Jobs button is present | EXPECTED: 'Search Jobs' CTA button visible
- assertVisible: "Search Jobs"

# SCENARIO: Trending section is present | EXPECTED: 'Trending' label visible in jobs feed
- assertVisible: "Trending"

# SCENARIO: Trending job chips are visible | EXPECTED: 'Remote' and 'Frontend' trending chips shown
- assertVisible: "Remote"
- assertVisible: "Frontend"

# SCENARIO: Explore by Category section is present | EXPECTED: 'Explore by Category' section header visible
- assertVisible: "Explore by Category"

# SCENARIO: Marketplace tab switches to freelance view | EXPECTED: Tapping 'Marketplace' tab shows marketplace content
- tapOn: "Marketplace"
- waitForAnimationToEnd

# SCENARIO: Remote Hub screen remains after tab switch | EXPECTED: 'REMOTE HUB' title still visible
- assertVisible: "REMOTE HUB"

# SCENARIO: Remote Hub screen is scrollable | EXPECTED: Scroll down works without crash
- scroll

# SCENARIO: Remote Hub screen scrolls back to top | EXPECTED: Swipe down returns to top
- swipe:
    direction: DOWN
