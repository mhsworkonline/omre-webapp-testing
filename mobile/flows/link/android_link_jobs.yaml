appId: com.omre.app.posh
---
# Link Jobs Module - android_link_jobs.yaml
# 38 test cases: navigation, jobs tab, marketplace tab, search, content taps, back nav
# Note: Link back-stack depth is inconsistent; use stopApp+launchApp for all re-nav

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 - Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 - Navigate to Link
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 - Link landing shows Explore Jobs CTA
- assertVisible: "Explore Jobs"

# TC05 - Browse Marketplace CTA also visible
- assertVisible: "Browse Marketplace"

# TC06 - Tap Explore Jobs
- tapOn: "Explore Jobs"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC07 - Jobs tab visible
- assertVisible: "Jobs"

# TC08 - Marketplace tab visible
- assertVisible: "Marketplace"

# TC09 - Search Jobs button visible
- assertVisible: "Search Jobs"

# TC10 - Tap search title field (~50%,38%)
- tapOn:
    point: "50%,38%"
- waitForAnimationToEnd
- inputText: "Flutter Developer"
- waitForAnimationToEnd

# TC11 - Tap location field (~50%,46%)
- tapOn:
    point: "50%,46%"
- waitForAnimationToEnd
- inputText: "Remote"
- waitForAnimationToEnd

# TC12 - Tap Search Jobs
- tapOn: "Search Jobs"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC13 - Restart app to guarantee Social Home
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC14 - Re-navigate to Link / Jobs
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Explore Jobs"
    commands:
      - tapOn: "Explore Jobs"
      - waitForAnimationToEnd
- assertVisible: "Jobs"

# TC15 - Tap trending chip Remote (~12%,67%)
- tapOn:
    point: "12%,67%"
- waitForAnimationToEnd
- assertVisible: "Jobs"

# TC16 - Scroll down through job listings
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC17 - Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC18 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC19 - Tap a job listing (~50%,50%)
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC20 - Restart app to guarantee Social Home
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC21 - Re-navigate to Link / Jobs
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Explore Jobs"
    commands:
      - tapOn: "Explore Jobs"
      - waitForAnimationToEnd
- assertVisible: "Jobs"

# TC22 - Switch to Marketplace tab
- tapOn: "Marketplace"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC23 - Marketplace loaded no crash
- assertNotVisible: "Something went wrong"

# TC24 - Scroll marketplace
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC25 - Tap a marketplace item (~50%,40%)
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC26 - Restart app to guarantee Social Home
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC27 - Re-navigate to Link / Marketplace
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Browse Marketplace"
    commands:
      - tapOn: "Browse Marketplace"
      - waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Marketplace"

# TC28 - Scroll marketplace
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC29 - Tap second marketplace item (~50%,55%)
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC30 - Restart app to guarantee Social Home
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC31 - Re-navigate to Link Jobs
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Explore Jobs"
    commands:
      - tapOn: "Explore Jobs"
      - waitForAnimationToEnd
- assertVisible: "Jobs"

# TC32 - Tab switching Jobs/Marketplace
- tapOn: "Marketplace"
- waitForAnimationToEnd
- tapOn: "Jobs"
- waitForAnimationToEnd
- assertVisible: "Jobs"

# TC33 - Tap Apply on first listing (~92%,50%)
- tapOn:
    point: "92%,50%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC34 - Restart app to guarantee Social Home
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC35 - Re-navigate to Link Jobs
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- tapOn: "Link"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Explore Jobs"
    commands:
      - tapOn: "Explore Jobs"
      - waitForAnimationToEnd
- assertVisible: "Jobs"

# TC36 - Top search icon (~88%,9%)
- tapOn:
    point: "88%,9%"
- waitForAnimationToEnd

# TC37 - Restart app to guarantee Social Home
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC38 - Module switcher accessible from Social Home
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"
- pressKey: Back
- waitForAnimationToEnd
