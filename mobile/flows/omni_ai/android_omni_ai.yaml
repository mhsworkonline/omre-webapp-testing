appId: com.omre.app.posh
---
# Omni AI Module (physical device)
# 1 full swipe UP + short swipe brings Omni AI into view
# Tap Omni AI by text (tapOn is lenient on visibility unlike assertVisible/scrollUntilVisible)

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC02 - Open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC03 - Scroll drawer: 1 full swipe + short nudge to reveal Omni AI
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    start: "50%,90%"
    end: "50%,72%"
    duration: 800
- waitForAnimationToEnd

# TC04 - Tap Omni AI by coordinate (bottom portion of ESSENTIALS list)
- tapOn:
    point: "50%,77%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC05 - No crash on load
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC06 - Scroll down
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Unfortunately"
- assertNotVisible: "Something went wrong"

# TC07 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC08 - Tap first item
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC09 - Back from detail
- pressKey: Back
- waitForAnimationToEnd

# TC10 - Tap second item
- tapOn:
    point: "50%,60%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC11 - Back from detail
- pressKey: Back
- waitForAnimationToEnd

# TC12 - Back to Social Home
- pressKey: Back
- waitForAnimationToEnd

# TC13 - Scroll to top of Social Home
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "View all"

# TC14 - Second visit: open drawer
- tapOn:
    point: "7%,9%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC15 - Scroll drawer second visit (same calibration)
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    start: "50%,90%"
    end: "50%,72%"
    duration: 800
- waitForAnimationToEnd

# TC16 - Tap Omni AI second visit
- tapOn:
    point: "50%,77%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC17 - Stable on second visit
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Unfortunately"

# TC18 - Scroll and return
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC19 - Back from second visit
- pressKey: Back
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"
