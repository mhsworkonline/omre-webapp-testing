appId: com.omre.app.posh
---
- launchApp:
    clearState: false

- assertVisible: "For You"

# Open inbox via bell icon
- tapOn: "Notifications"
- assertVisible: "Mark all as read"
- assertVisible: "Clear all"
- assertNotVisible: "Welcome back"

# Tab switches
- assertVisible: "All"
- assertVisible: "Social"
- assertVisible: "Messages"
- assertVisible: "Business"

- tapOn: "Social"
- assertVisible: "Social"
- tapOn: "Messages"
- assertVisible: "Messages"
- tapOn: "Business"
- assertVisible: "Business"
- tapOn: "All"
- assertVisible: "All"

# Scroll down — more notifications or empty state
- scroll
- swipe:
    direction: DOWN

- assertVisible: "Mark all as read"

# Back to feed
- pressKey: Back
- assertVisible: "For You"
