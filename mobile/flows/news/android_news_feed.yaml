appId: com.omre.app.posh
---
# News Feed - android_news_feed.yaml
# 38 test cases: navigation, browse articles, scroll, tabs,
# share, search, back nav
# Note: Back from article goes to home (like Images) - re-nav after each

# TC01 - Launch app
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# TC02 - Open module switcher
- tapOn: "View all"
- waitForAnimationToEnd

# TC03 - Navigate to News
- tapOn: "News"
- waitForAnimationToEnd
- waitForAnimationToEnd

# TC04 - News screen heading visible
- assertNotVisible: "Something went wrong"

# TC05 - Scroll down through news feed
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC06 - News heading persists during scroll
- assertNotVisible: "Something went wrong"

# TC07 - Second scroll
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC08 - News still visible
- assertNotVisible: "Something went wrong"

# TC09 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC10 - News heading at top
- assertNotVisible: "Something went wrong"

# TC11 - Tap first news article (y=40% avoids tab row at ~18%)
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd

# TC12 - Back from article (goes to home)
- pressKey: Back
- waitForAnimationToEnd

# TC13 - Re-navigate to News
- tapOn: "View all"
- waitForAnimationToEnd
- tapOn: "News"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC14 - Tap second article
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd

# TC15 - Back from article
- pressKey: Back
- waitForAnimationToEnd

# TC16 - Re-navigate to News
- tapOn: "View all"
- waitForAnimationToEnd
- tapOn: "News"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC17 - Tap third article
- tapOn:
    point: "50%,70%"
- waitForAnimationToEnd

# TC18 - Back from article
- pressKey: Back
- waitForAnimationToEnd

# TC19 - Re-navigate to News
- tapOn: "View all"
- waitForAnimationToEnd
- tapOn: "News"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC20 - Share first article (share icon ~88%,40%)
- tapOn:
    point: "88%,40%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC21 - Re-navigate after share if needed
- tapOn: "View all"
- waitForAnimationToEnd
- tapOn: "News"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC22 - Tap search/filter icon top-right
- tapOn:
    point: "88%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC23 - News still visible after search dismiss
- assertNotVisible: "Something went wrong"

# TC24 - Tap category tab 2 (~30%,18%)
- tapOn:
    point: "30%,18%"
- waitForAnimationToEnd

# TC25 - News still visible in tab 2
- assertNotVisible: "Something went wrong"

# TC26 - Scroll tab 2 content
- swipe:
    direction: UP
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC27 - Tap category tab 3 (~60%,18%)
- tapOn:
    point: "60%,18%"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC28 - Scroll tab 3 content
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC29 - Tap back to first tab (~10%,18%)
- tapOn:
    point: "10%,18%"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC30 - Scroll to bottom of feed
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: UP
- waitForAnimationToEnd

# TC31 - Scroll back to top
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC32 - Tap top-right options icon
- tapOn:
    point: "88%,9%"
- waitForAnimationToEnd
- pressKey: Back
- waitForAnimationToEnd

# TC33 - News accessible after options dismiss
- assertNotVisible: "Something went wrong"

# TC34 - Tap bookmark/save icon on first article (~75%,40%)
- tapOn:
    point: "75%,40%"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC35 - Tap like/react on first article (~65%,40%)
- tapOn:
    point: "65%,40%"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC36 - Scroll through feed one more time
- swipe:
    direction: UP
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# TC37 - Scroll to top of News feed
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- swipe:
    direction: DOWN
- waitForAnimationToEnd

# TC38 - News heading visible at top after full test cycle
- assertNotVisible: "Something went wrong"
