appId: com.omre.app.posh
---
# SCENARIO: App launches clean to home screen | EXPECTED: App opens without crash
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd

# SCENARIO: Home screen confirms correct starting state | EXPECTED: 'Explore OMRE Modules' visible
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher entry point is present | EXPECTED: 'View all' button visible on home screen
- assertVisible: "View all"

# SCENARIO: Module switcher opens for navigation | EXPECTED: 'Switch to Module' header appears
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: News module is listed in module switcher | EXPECTED: 'News' option visible in switcher list
- assertVisible: "News"

# SCENARIO: News module entry navigates to News | EXPECTED: Tapping 'News' opens News module
- tapOn: "News"
- waitForAnimationToEnd

# SCENARIO: News module loads without crash | EXPECTED: No error overlay appears after entering News
- assertNotVisible: "Something went wrong"

# SCENARIO: News module has no crash dialog | EXPECTED: 'Unfortunately' crash dialog not present
- assertNotVisible: "Unfortunately"

# SCENARIO: My Feed tab is present in News | EXPECTED: 'My Feed' tab visible
- assertVisible: "My Feed"

# SCENARIO: Following tab is present in News | EXPECTED: 'Following' tab visible
- assertVisible: "Following"

# SCENARIO: Live Coverage tab is present in News | EXPECTED: 'Live Coverage' tab visible
- assertVisible: "Live Coverage"

# SCENARIO: My Feed tab is tappable and activates | EXPECTED: Tapping 'My Feed' selects that tab without crash
- tapOn: "My Feed"
- waitForAnimationToEnd
- assertVisible: "My Feed"

# SCENARIO: My Feed content loads without error | EXPECTED: No error overlay on My Feed tab
- assertNotVisible: "Something went wrong"

# SCENARIO: My Feed is scrollable downward | EXPECTED: Scroll down works without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: My Feed scrolls further down | EXPECTED: Second scroll continues without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: My Feed scrolls back to top | EXPECTED: Swipe down returns toward top of feed
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "My Feed"

# SCENARIO: Pull to refresh on My Feed | EXPECTED: Feed refreshes without crash and tab still visible
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "My Feed"

# SCENARIO: Following tab switches feed view | EXPECTED: Tapping 'Following' loads following content without crash
- tapOn: "Following"
- waitForAnimationToEnd
- assertVisible: "Following"

# SCENARIO: Following feed loads without error | EXPECTED: No error overlay on Following tab
- assertNotVisible: "Something went wrong"

# SCENARIO: Following feed is scrollable | EXPECTED: Scroll down on Following tab works without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Following feed scrolls back to top | EXPECTED: Swipe down restores top of Following feed
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Following"

# SCENARIO: Live Coverage tab switches feed view | EXPECTED: Tapping 'Live Coverage' loads live content without crash
- tapOn: "Live Coverage"
- waitForAnimationToEnd
- assertVisible: "Live Coverage"

# SCENARIO: Live Coverage feed loads without error | EXPECTED: No error overlay on Live Coverage tab
- assertNotVisible: "Something went wrong"

# SCENARIO: Live Coverage feed is scrollable | EXPECTED: Scroll down on Live Coverage tab works without crash
- swipe:
    direction: UP
- waitForAnimationToEnd

# SCENARIO: Live Coverage feed scrolls back to top | EXPECTED: Swipe down restores top of Live Coverage feed
- swipe:
    direction: DOWN
- waitForAnimationToEnd
- assertVisible: "Live Coverage"

# SCENARIO: Return to My Feed after tab exploration | EXPECTED: My Feed tab still tappable and loads content
- tapOn: "My Feed"
- waitForAnimationToEnd
- assertVisible: "My Feed"

# SCENARIO: No error state visible after tab cycling | EXPECTED: 'Something went wrong' not present
- assertNotVisible: "Something went wrong"

# SCENARIO: No crash dialog visible after tab cycling | EXPECTED: App crash overlay not present
- assertNotVisible: "Unfortunately"

# SCENARIO: Back navigation returns to home from News | EXPECTED: Pressing Back exits News and home screen loads
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"

# SCENARIO: Module switcher re-opens for second entry | EXPECTED: 'View all' still accessible and switcher opens
- tapOn: "View all"
- waitForAnimationToEnd
- assertVisible: "Switch to Module"

# SCENARIO: News re-entry via module switcher | EXPECTED: Tapping 'News' again opens News module without crash
- tapOn: "News"
- waitForAnimationToEnd
- assertNotVisible: "Something went wrong"

# SCENARIO: News tabs still present on second visit | EXPECTED: My Feed, Following, Live Coverage all visible on re-entry
- assertVisible: "My Feed"
- assertVisible: "Following"
- assertVisible: "Live Coverage"

# SCENARIO: Back from News on second visit returns to home | EXPECTED: Home screen loads cleanly after second News visit
- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Explore OMRE Modules"
